<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArtRef - Помощник Художника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #FF5F5F;
            --bg-dark: #111;
        }
        body {
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            margin: 0;
            color: white;
            position: fixed;
            width: 100vw;
            height: 100dvh; 
        }
        .app-container {
            width: 100vw;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }
        .canvas-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #placeholder {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .img-layer {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: 50% 50%;
            max-width: none;
            max-height: none;
            pointer-events: none;
            display: none;
            will-change: transform;
        }
        #ref-image { z-index: 2; }
        #user-image { z-index: 3; opacity: 0.5; }

        /* Шторка меню */
        .settings-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            color: #333;
        }
        @media (max-width: 640px) {
            .settings-drawer { width: 85%; }
        }
        .settings-drawer.open { transform: translateX(0); }
        .drawer-handle {
            position: absolute;
            left: -48px;
            top: 80px;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }

        #pivot-point {
            position: absolute;
            width: 44px;
            height: 44px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            z-index: 60;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            display: none;
            background: rgba(255, 95, 95, 0.1);
        }
        #pivot-point::before, #pivot-point::after {
            content: '';
            position: absolute;
            background: var(--primary);
        }
        #pivot-point::before { top: 50%; left: -10px; right: -10px; height: 1px; transform: translateY(-50%); }
        #pivot-point::after { left: 50%; top: -10px; bottom: -10px; width: 1px; transform: translateX(-50%); }

        .perimeter-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        
        .edge-btn {
            position: absolute;
            width: 44px;
            height: 44px;
            background: rgba(20, 20, 20, 0.85);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .edge-btn:active { background: rgba(50, 50, 50, 0.9); border-color: rgba(255,255,255,0.2); }
        .edge-btn svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; }

        .edge-btn.active-target { border-color: var(--primary); background: rgba(25, 25, 25, 0.95); }
        .edge-btn.active-target svg { stroke: var(--primary); }

        .p-top-left { top: max(16px, env(safe-area-inset-top)); left: max(16px, env(safe-area-inset-left)); }
        .p-top-center { top: max(16px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); }
        .p-top-right { top: max(16px, env(safe-area-inset-top)); right: max(16px, env(safe-area-inset-right)); }
        
        .p-mid-left { top: 50%; left: max(16px, env(safe-area-inset-left)); transform: translateY(-50%); }
        .p-mid-right { top: 50%; right: max(16px, env(safe-area-inset-right)); transform: translateY(-50%); }
        
        .p-bottom-left { bottom: max(40px, env(safe-area-inset-bottom)); left: max(16px, env(safe-area-inset-left)); }
        .p-bottom-right { bottom: max(40px, env(safe-area-inset-bottom)); right: max(16px, env(safe-area-inset-right)); }
        
        .p-bottom-center {
            position: absolute;
            bottom: max(40px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .p-bottom-center .edge-btn { position: relative; top: auto; bottom: auto; left: auto; right: auto; transform: none; }

        .active-btn { background-color: var(--primary) !important; color: white !important; }
        .grid-line { stroke: rgba(255, 255, 255, 0.15); stroke-width: 1; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container" id="interaction-zone">
    <div class="canvas-area">
        <div id="placeholder" class="text-gray-500 text-center pointer-events-none px-6 w-full">
            <p class="text-xl font-bold mb-2">ArtRef</p>
            <p class="text-xs opacity-70 uppercase tracking-widest">Меню: свайп влево от края</p>
        </div>
        <img id="ref-image" class="img-layer" alt="Ref">
        <img id="user-image" class="img-layer" alt="User">
        <svg id="grid-overlay" class="absolute inset-0 pointer-events-none z-10 hidden w-full h-full"></svg>
    </div>

    <div id="pivot-point"></div>

    <div id="perimeter-panel" class="perimeter-panel">
        <div class="edge-btn p-top-left" onpointerdown="startNudge('r', -0.5)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </div>
        <div class="edge-btn p-top-center" onpointerdown="startNudge('y', -2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
        </div>
        <div class="edge-btn p-top-right" onpointerdown="startNudge('r', 0.5)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <svg viewBox="0 0 24 24" style="transform: scaleX(-1)"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </div>
        
        <div class="edge-btn p-mid-left" onpointerdown="startNudge('x', -2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </div>
        <div class="edge-btn p-mid-right" onpointerdown="startNudge('x', 2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </div>

        <div class="edge-btn p-bottom-left" onpointerdown="startNudge('s', 0.995)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
        </div>
        
        <div class="p-bottom-center">
            <div class="edge-btn" onpointerdown="startNudge('y', 2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
                <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
            </div>
            <div id="btn-pivot-toggle" class="edge-btn active-target" onclick="toggleCustomPivot()">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 2v20M2 12h20"/></svg>
            </div>
        </div>

        <div class="edge-btn p-bottom-right" onpointerdown="startNudge('s', 1.005)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </div>
    </div>

    <!-- Settings Drawer -->
    <aside id="drawer" class="settings-drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg id="drawer-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        <div class="p-6 h-full overflow-y-auto space-y-6">
            <h2 class="text-xl font-bold border-b pb-2">Управление</h2>
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Слои</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold">РЕФЕРЕНС</button>
                    <button onclick="document.getElementById('user-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold">РИСУНОК</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="loadFile(this, 'ref-image')">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="loadFile(this, 'user-image')">
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Режимы</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-link" onclick="toggleLink()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors">
                        <svg class="mb-1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                        <span class="text-[9px] font-bold uppercase">Связка</span>
                    </button>
                    <button id="btn-precision" onclick="togglePrecision()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors">
                        <svg class="mb-1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m12 8 4 4-4 4"/></svg>
                        <span class="text-[9px] font-bold uppercase">Точность</span>
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Прозрачность</span>
                    <span id="opacity-val" class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded">50%</span>
                </div>
                <input type="range" id="opacity-slider" min="0" max="100" value="50" class="w-full accent-red-500" oninput="updateOpacity()">
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl space-y-4 border border-gray-100">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase text-gray-500">Сетка</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="grid-toggle" class="sr-only peer" onchange="toggleGrid()">
                        <div class="w-10 h-5 bg-gray-300 rounded-full peer peer-checked:bg-red-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                    </label>
                </div>
                <input type="range" id="grid-size" min="2" max="40" value="8" class="w-full accent-gray-400" oninput="drawGrid()">
            </div>

            <button onclick="resetAll()" class="w-full py-4 text-red-500 font-bold text-[10px] border border-red-100 rounded-xl hover:bg-red-50 uppercase tracking-widest">Сбросить всё</button>
            <p class="text-[9px] text-center text-gray-400 uppercase tracking-tighter">Свайп вправо, чтобы закрыть</p>
        </div>
    </aside>
</div>

<script>
    let states = {
        ref: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 },
        user: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 }
    };
    
    let isLinked = false;
    let isPrecisionMode = false;
    let isCustomPivot = true; 
    
    let pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let activePointers = new Map();
    let nudgeInterval = null;

    const refEl = document.getElementById('ref-image');
    const userEl = document.getElementById('user-image');
    const pivotEl = document.getElementById('pivot-point');
    const drawer = document.getElementById('drawer');
    const perimeterPanel = document.getElementById('perimeter-panel');
    const btnPivotToggle = document.getElementById('btn-pivot-toggle');

    function toggleDrawer(open) {
        if (typeof open === 'boolean') {
            drawer.classList.toggle('open', open);
        } else {
            drawer.classList.toggle('open');
        }
    }

    // --- ЛОГИКА СВАЙПА ---
    let touchStartX = 0;
    let touchStartY = 0;
    const SWIPE_THRESHOLD = 50; 

    window.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    window.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].screenX;
        const touchEndY = e.changedTouches[0].screenY;
        handleSwipe(touchStartX, touchEndX, touchStartY, touchEndY);
    }, {passive: true});

    function handleSwipe(startX, endX, startY, endY) {
        const dx = endX - startX;
        const dy = endY - startY;
        
        if (Math.abs(dx) > Math.abs(dy)) {
            if (drawer.classList.contains('open')) {
                // Внутри открытого меню свайп вправо закрывает его
                if (dx > SWIPE_THRESHOLD) toggleDrawer(false);
            } else {
                // Свайп влево от правого края (30% ширины) открывает меню
                if (dx < -SWIPE_THRESHOLD && startX > window.innerWidth * 0.7) {
                    toggleDrawer(true);
                }
            }
        }
    }

    function toggleLink() {
        isLinked = !isLinked;
        document.getElementById('btn-link').classList.toggle('active-btn', isLinked);
    }

    function togglePrecision() {
        isPrecisionMode = !isPrecisionMode;
        document.getElementById('btn-precision').classList.toggle('active-btn', isPrecisionMode);
        perimeterPanel.style.display = isPrecisionMode ? 'block' : 'none';
        updatePivotUI();
        applyTransforms();
    }

    function toggleCustomPivot() {
        isCustomPivot = !isCustomPivot;
        updatePivotUI();
    }

    function updatePivotUI() {
        if (isPrecisionMode && isCustomPivot) {
            pivotEl.style.display = 'block';
            pivotEl.style.left = pivot.x + 'px';
            pivotEl.style.top = pivot.y + 'px';
            btnPivotToggle.classList.add('active-target');
        } else {
            pivotEl.style.display = 'none';
            btnPivotToggle.classList.remove('active-target');
        }
    }

    function loadFile(input, id) {
        if (input.files?.[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                applyTransforms();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateOpacity() {
        const val = document.getElementById('opacity-slider').value;
        userEl.style.opacity = val / 100;
        document.getElementById('opacity-val').innerText = val + '%';
    }

    function applyTransforms() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        [refEl, userEl].forEach((el, index) => {
            const key = index === 0 ? 'ref' : 'user';
            const s = states[key];
            const tx = s.x - cx;
            const ty = s.y - cy;
            el.style.transform = `translate(-50%, -50%) translate(${tx}px, ${ty}px) rotate(${s.r}deg) scale(${s.s})`;
        });
    }

    function startNudge(key, val) {
        stopNudge();
        const perform = () => {
            const targets = isLinked ? ['ref', 'user'] : ['user'];
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const activePivotX = (isPrecisionMode && isCustomPivot) ? pivot.x : cx;
            const activePivotY = (isPrecisionMode && isCustomPivot) ? pivot.y : cy;
            targets.forEach(t => {
                const s = states[t];
                if (key === 'x') s.x += val;
                if (key === 'y') s.y += val;
                if (key === 'r') {
                    const dx = s.x - activePivotX;
                    const dy = s.y - activePivotY;
                    const dist = Math.hypot(dx, dy);
                    const angle = Math.atan2(dy, dx);
                    const newAngle = angle + (val * Math.PI / 180);
                    s.x = activePivotX + dist * Math.cos(newAngle);
                    s.y = activePivotY + dist * Math.sin(newAngle);
                    s.r += val;
                }
                if (key === 's') {
                    s.x = activePivotX + (s.x - activePivotX) * val;
                    s.y = activePivotY + (s.y - activePivotY) * val;
                    s.s *= val;
                }
            });
            applyTransforms();
        };
        perform();
        nudgeInterval = setInterval(perform, 30);
    }

    function stopNudge() {
        if (nudgeInterval) clearInterval(nudgeInterval);
    }

    const zone = document.getElementById('interaction-zone');
    let initialDist = 0;
    let initialAngle = 0;

    zone.addEventListener('pointerdown', e => {
        if (e.target.closest('#drawer') || e.target.closest('.edge-btn')) return;
        if (isPrecisionMode) {
            if (isCustomPivot) {
                pivot.x = e.clientX;
                pivot.y = e.clientY;
                updatePivotUI();
                activePointers.set(e.pointerId, 'pivot');
            }
            return;
        }
        activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (activePointers.size === 2) {
            const pts = Array.from(activePointers.values());
            initialDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            initialAngle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
        }
    });

    zone.addEventListener('pointermove', e => {
        if (isPrecisionMode) {
            if (activePointers.has(e.pointerId) && activePointers.get(e.pointerId) === 'pivot') {
                pivot.x = e.clientX;
                pivot.y = e.clientY;
                updatePivotUI();
            }
            return;
        }
        if (!activePointers.has(e.pointerId)) return;
        
        const targets = isLinked ? ['ref', 'user'] : ['user'];

        if (activePointers.size === 1) {
            const prev = activePointers.get(e.pointerId);
            const dx = e.clientX - prev.x;
            const dy = e.clientY - prev.y;
            targets.forEach(t => { states[t].x += dx; states[t].y += dy; });
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        } else if (activePointers.size === 2) {
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            const pts = Array.from(activePointers.values());
            const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            const angle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
            
            const sFact = initialDist > 0 ? dist / initialDist : 1;
            
            // ПРАВКА: Если включен режим связки, поворот жестами игнорируем
            const aDiff = isLinked ? 0 : (angle - initialAngle);
            
            targets.forEach(t => { 
                states[t].s *= sFact; 
                states[t].r += aDiff; 
            });
            
            initialDist = dist;
            initialAngle = angle;
        }
        applyTransforms();
    });

    zone.addEventListener('pointerup', e => { activePointers.delete(e.pointerId); });
    zone.addEventListener('pointercancel', e => { activePointers.delete(e.pointerId); });

    function toggleGrid() {
        document.getElementById('grid-overlay').classList.toggle('hidden');
        drawGrid();
    }

    function drawGrid() {
        const size = document.getElementById('grid-size').value;
        const svg = document.getElementById('grid-overlay');
        const w = window.innerWidth, h = window.innerHeight;
        svg.innerHTML = '';
        const step = w / size;
        for(let x=0; x<=w; x+=step) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", x); l.setAttribute("y1", 0); l.setAttribute("x2", x); l.setAttribute("y2", h);
            l.setAttribute("class", "grid-line"); svg.appendChild(l);
        }
        for(let y=0; y<=h; y+=step) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", 0); l.setAttribute("y1", y); l.setAttribute("x2", w); l.setAttribute("y2", y);
            l.setAttribute("class", "grid-line"); svg.appendChild(l);
        }
    }

    function resetAll() {
        if(confirm('Сбросить положение?')) {
            states.ref = { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 };
            states.user = { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 };
            pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            updatePivotUI();
            applyTransforms();
        }
    }

    window.addEventListener('resize', () => {
        drawGrid();
        if (!isPrecisionMode) {
            pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            updatePivotUI();
        }
        applyTransforms();
    });
</script>

</body>
</html>
