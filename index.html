<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArtRef - Помощник Художника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #FF5F5F;
            --bg-dark: #111;
        }
        body {
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            margin: 0;
            color: white;
            position: fixed;
            width: 100vw;
            height: 100dvh; 
        }
        .app-container {
            width: 100vw;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }
        .canvas-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        .img-layer {
            position: absolute;
            left: 50%; top: 50%;
            transform-origin: 50% 50%;
            max-width: none;
            max-height: none;
            pointer-events: none;
            display: none;
            will-change: transform, filter, opacity;
            transition: opacity 0.2s ease;
        }
        #ref-image { z-index: 2; }
        #user-image { z-index: 3; }

        /* UI States */
        .ui-element {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }
        .ui-hidden-state .hide-on-idle {
            opacity: 0;
            pointer-events: none !important;
        }

        /* Drawer */
        .settings-drawer {
            position: absolute;
            top: 0; right: 0; width: 300px; height: 100%;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            color: #333;
        }
        @media (max-width: 640px) { .settings-drawer { width: 85%; } }
        .settings-drawer.open { transform: translateX(0); }
        .drawer-handle {
            position: absolute;
            left: -48px; top: 80px; width: 48px; height: 48px;
            background: white; border-radius: 12px 0 0 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary);
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            z-index: 101;
        }

        /* Pivot */
        #pivot-point {
            position: absolute;
            width: 32px; height: 32px;
            border: 1.5px solid var(--primary);
            border-radius: 50%;
            z-index: 60;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            display: none;
            background: rgba(255, 95, 95, 0.1);
        }

        /* Perimeter Controls */
        .perimeter-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        .edge-btn-container {
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }
        .edge-btn {
            width: 32px; height: 32px;
            background: #2A2A2A; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #555;
            transition: transform 0.1s, background 0.1s;
        }
        .edge-btn.nudge-btn { background: var(--primary); border: none; box-shadow: 0 2px 8px rgba(255, 95, 95, 0.3); }
        .edge-btn-container:active .edge-btn { transform: scale(0.85); }
        .edge-btn svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; }
        .active-target .edge-btn { border-color: var(--primary); background: #4D2626; }

        /* Positions */
        .p-top-left { position: absolute; top: max(8px, env(safe-area-inset-top)); left: max(8px, env(safe-area-inset-left)); display: flex; flex-direction: column; }
        .p-top-center { position: absolute; top: max(8px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); display: flex; }
        .p-top-right { position: absolute; top: max(8px, env(safe-area-inset-top)); right: max(8px, env(safe-area-inset-right)); }
        .p-mid-left { position: absolute; top: 50%; left: max(8px, env(safe-area-inset-left)); transform: translateY(-50%); }
        .p-mid-right { position: absolute; top: 50%; right: max(8px, env(safe-area-inset-right)); transform: translateY(-50%); }
        .p-bottom-left { position: absolute; bottom: max(12px, env(safe-area-inset-bottom)); left: max(8px, env(safe-area-inset-left)); }
        .p-bottom-center { position: absolute; bottom: max(12px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); }
        .p-bottom-right { position: absolute; bottom: max(12px, env(safe-area-inset-bottom)); right: max(8px, env(safe-area-inset-right)); }

        .ui-hidden-state .p-top-left .edge-btn-container { transform: translate(-80px, -80px); }
        .ui-hidden-state .p-top-center .edge-btn-container { transform: translateY(-80px); }
        .ui-hidden-state .p-top-right { transform: translate(80px, -80px); }
        .ui-hidden-state .p-mid-left { transform: translate(-80px, -50%); }
        .ui-hidden-state .p-mid-right { transform: translate(80px, -50%); }
        .ui-hidden-state .p-bottom-left { transform: translate(-80px, 80px); }
        .ui-hidden-state .p-bottom-center { transform: translate(-50%, 80px); }
        .ui-hidden-state .p-bottom-right { transform: translate(80px, 80px); }

        /* Crop Overlay */
        #crop-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #crop-container {
            position: relative;
            max-width: 90vw;
            max-height: 70vh;
            overflow: hidden;
            background: #222;
        }
        #crop-img {
            max-width: 90vw;
            max-height: 70vh;
            display: block;
        }
        #crop-box {
            position: absolute;
            border: 2px solid var(--primary);
            box-shadow: 0 0 0 5000px rgba(0,0,0,0.6);
            cursor: move;
            touch-action: none;
        }
        .crop-handle {
            position: absolute;
            width: 20px; height: 20px;
            background: white;
            border: 2px solid var(--primary);
            border-radius: 4px;
        }
        .ch-nw { top: -10px; left: -10px; cursor: nw-resize; }
        .ch-ne { top: -10px; right: -10px; cursor: ne-resize; }
        .ch-sw { bottom: -10px; left: -10px; cursor: sw-resize; }
        .ch-se { bottom: -10px; right: -10px; cursor: se-resize; }

        .btn-disabled { opacity: 0.4; cursor: not-allowed !important; filter: grayscale(1); }
        .active-btn { background-color: var(--primary) !important; color: white !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container" id="interaction-zone">
    <div class="canvas-area">
        <div id="placeholder" class="text-gray-500 text-center pointer-events-none px-6 w-full absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
            <p class="text-xl font-bold mb-2 text-white">ArtRef</p>
            <p class="text-xs opacity-70 uppercase tracking-widest text-red-400">Шаг 1: Загрузите Референс</p>
        </div>
        <img id="ref-image" class="img-layer" alt="Ref">
        <img id="user-image" class="img-layer" alt="User">
        <svg id="grid-overlay" class="absolute inset-0 pointer-events-none z-10 hidden w-full h-full"></svg>
    </div>

    <div id="pivot-point"></div>

    <div id="perimeter-panel" class="perimeter-panel ui-element hide-on-idle">
        <div class="p-top-left">
            <div class="edge-btn-container" onpointerdown="startNudge('r', -0.5)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
                <div class="edge-btn nudge-btn">
                    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </div>
            </div>
            <div class="edge-btn-container" onclick="toggleGrid()" id="btn-grid-toggle-main">
                <div class="edge-btn">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
                </div>
            </div>
        </div>
        <div class="p-top-center">
            <div class="edge-btn-container" onclick="toggleUserVisibility()">
                <div class="edge-btn" id="btn-visibility-toggle">
                    <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </div>
            </div>
            <div class="edge-btn-container" onpointerdown="startNudge('y', -2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
                <div class="edge-btn nudge-btn"><svg viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg></div>
            </div>
            <div class="edge-btn-container active-target" id="btn-pivot-toggle" onclick="toggleCustomPivot()">
                <div class="edge-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 2v20M2 12h20"/></svg></div>
            </div>
        </div>
        <div class="p-top-right edge-btn-container" onpointerdown="startNudge('r', 0.5)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <div class="edge-btn nudge-btn"><svg viewBox="0 0 24 24" style="transform: scaleX(-1)"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></div>
        </div>
        <div class="p-mid-left edge-btn-container" onpointerdown="startNudge('x', -2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <div class="edge-btn nudge-btn"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></div>
        </div>
        <div class="p-mid-right edge-btn-container" onpointerdown="startNudge('x', 2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <div class="edge-btn nudge-btn"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>
        </div>
        <div class="p-bottom-left edge-btn-container" onpointerdown="startNudge('s', 0.995)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <div class="edge-btn nudge-btn"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></div>
        </div>
        <div class="p-bottom-center edge-btn-container" onpointerdown="startNudge('y', 2)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <div class="edge-btn nudge-btn"><svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></div>
        </div>
        <div class="p-bottom-right edge-btn-container" onpointerdown="startNudge('s', 1.005)" onpointerup="stopNudge()" onpointerleave="stopNudge()">
            <div class="edge-btn nudge-btn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
        </div>
    </div>

    <!-- Crop Screen -->
    <div id="crop-screen">
        <h3 class="text-white mb-4 font-bold uppercase tracking-widest">Обрезать референс</h3>
        <div id="crop-container">
            <img id="crop-img" src="" alt="">
            <div id="crop-box">
                <div class="crop-handle ch-nw" data-handle="nw"></div>
                <div class="crop-handle ch-ne" data-handle="ne"></div>
                <div class="crop-handle ch-sw" data-handle="sw"></div>
                <div class="crop-handle ch-se" data-handle="se"></div>
            </div>
        </div>
        <div class="flex gap-4 mt-6">
            <button onclick="closeCrop(false)" class="px-6 py-2 bg-gray-600 rounded-lg font-bold">ОТМЕНА</button>
            <button onclick="closeCrop(true)" class="px-8 py-2 bg-red-500 rounded-lg font-bold">ГОТОВО</button>
        </div>
    </div>

    <aside id="drawer" class="settings-drawer text-gray-800 ui-element">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg id="drawer-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="p-6 h-full overflow-y-auto space-y-6">
            <div class="flex items-center justify-between border-b pb-2">
                <h2 class="text-xl font-bold">Настройки</h2>
                <span id="auto-status-text" class="text-[10px] text-red-500 font-bold uppercase">Ожидание</span>
            </div>
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Загрузка</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 border-2 border-gray-100 rounded-xl text-[10px] font-bold uppercase">Референс</button>
                    <button id="btn-user-load" onclick="triggerUserLoad()" class="py-3 border-2 border-gray-100 rounded-xl text-[10px] font-bold uppercase btn-disabled">Рисунок</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="initCrop(this)">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="loadFile(this, 'user-image')">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button id="btn-link" onclick="toggleLink()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl text-gray-700">
                    <svg class="mb-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    <span class="text-[9px] font-bold uppercase">Связка</span>
                </button>
                <button onclick="resetAll()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl text-gray-700">
                    <svg class="mb-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    <span class="text-[9px] font-bold uppercase">Сброс</span>
                </button>
            </div>

            <div class="space-y-4 border-t pt-4">
                <div class="flex items-center gap-2">
                    <label id="active-target-label" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Настройка Слой</label>
                    <div id="target-pulse" class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div>
                </div>
                <div id="opacity-control">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-medium text-gray-400 uppercase tracking-widest">Прозрачность</span>
                        <span id="opacity-val" class="text-xs font-bold text-red-500">80%</span>
                    </div>
                    <input type="range" id="opacity-slider" min="0" max="100" value="80" class="w-full accent-red-500" oninput="updateFilters()">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-medium text-gray-400 uppercase tracking-widest">Контраст</span>
                        <span id="contrast-val" class="text-xs font-bold text-red-500">100%</span>
                    </div>
                    <input type="range" id="contrast-slider" min="50" max="300" value="100" class="w-full accent-red-500" oninput="updateFilters()">
                </div>
            </div>
        </div>
    </aside>
</div>

<script>
    let states = {
        ref: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0, opacity: 1, contrast: 100, brightness: 100 },
        user: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0, opacity: 0.8, contrast: 100, brightness: 100 }
    };
    
    let currentTarget = 'ref'; 
    let isLinked = false;
    let isCustomPivot = true; 
    let isUserVisible = true;
    let isRefLoaded = false;
    let isUserLoaded = false;
    
    let pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let activePointers = new Map();
    let nudgeInterval = null;
    let idleTimer = null;
    const IDLE_TIME = 8000;

    const refEl = document.getElementById('ref-image');
    const userEl = document.getElementById('user-image');
    const pivotEl = document.getElementById('pivot-point');
    const drawer = document.getElementById('drawer');
    const eyeIcon = document.getElementById('eye-icon');
    const userLoadBtn = document.getElementById('btn-user-load');
    const appContainer = document.getElementById('interaction-zone');

    // --- CROP LOGIC ---
    let originalImageSrc = "";
    const cropScreen = document.getElementById('crop-screen');
    const cropImg = document.getElementById('crop-img');
    const cropBox = document.getElementById('crop-box');
    let cropRect = { x: 50, y: 50, w: 200, h: 200 };
    let cropActive = false;
    let cropHandle = null;

    function initCrop(input) {
        if (!input.files?.[0]) return;
        const reader = new FileReader();
        reader.onload = e => {
            originalImageSrc = e.target.result;
            cropImg.src = originalImageSrc;
            cropScreen.style.display = 'flex';
            cropImg.onload = () => {
                const rect = cropImg.getBoundingClientRect();
                cropRect = { x: 20, y: 20, w: rect.width - 40, h: rect.height - 40 };
                updateCropBox();
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    function updateCropBox() {
        cropBox.style.left = cropRect.x + 'px';
        cropBox.style.top = cropRect.y + 'px';
        cropBox.style.width = cropRect.w + 'px';
        cropBox.style.height = cropRect.h + 'px';
    }

    cropBox.addEventListener('pointerdown', e => {
        cropActive = true;
        cropHandle = e.target.dataset.handle || 'move';
        e.stopPropagation();
    });

    window.addEventListener('pointermove', e => {
        if (!cropActive) return;
        const container = cropImg.getBoundingClientRect();
        const mx = e.clientX - container.left;
        const my = e.clientY - container.top;

        if (cropHandle === 'move') {
            cropRect.x = Math.max(0, Math.min(container.width - cropRect.w, mx - cropRect.w / 2));
            cropRect.y = Math.max(0, Math.min(container.height - cropRect.h, my - cropRect.h / 2));
        } else {
            if (cropHandle.includes('e')) cropRect.w = Math.max(30, Math.min(container.width - cropRect.x, mx - cropRect.x));
            if (cropHandle.includes('s')) cropRect.h = Math.max(30, Math.min(container.height - cropRect.y, my - cropRect.y));
            if (cropHandle.includes('w')) {
                const dx = cropRect.x - mx;
                if (cropRect.w + dx > 30 && mx > 0) { cropRect.x = mx; cropRect.w += dx; }
            }
            if (cropHandle.includes('n')) {
                const dy = cropRect.y - my;
                if (cropRect.h + dy > 30 && my > 0) { cropRect.y = my; cropRect.h += dy; }
            }
        }
        updateCropBox();
    });

    window.addEventListener('pointerup', () => { cropActive = false; });

    function closeCrop(apply) {
        if (apply) {
            const canvas = document.createElement('canvas');
            const img = cropImg;
            const scaleX = img.naturalWidth / img.width;
            const scaleY = img.naturalHeight / img.height;
            
            canvas.width = cropRect.w * scaleX;
            canvas.height = cropRect.h * scaleY;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, cropRect.x * scaleX, cropRect.y * scaleY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
            
            refEl.src = canvas.toDataURL();
            refEl.style.display = 'block';
            isRefLoaded = true;
            userLoadBtn.classList.remove('btn-disabled');
            fitImageToScreen(refEl, 'ref');
            checkAutoTarget();
        }
        cropScreen.style.display = 'none';
        document.getElementById('ref-input').value = "";
    }

    // --- MAIN LOGIC ---
    function toggleDrawer() { resetIdleTimer(); drawer.classList.toggle('open'); if (drawer.classList.contains('open')) syncSlidersToCurrentTarget(); }
    function triggerUserLoad() { if (isRefLoaded) document.getElementById('user-input').click(); }

    function syncSlidersToCurrentTarget() {
        const s = states[currentTarget];
        document.getElementById('opacity-slider').value = s.opacity * 100;
        document.getElementById('contrast-slider').value = s.contrast;
        document.getElementById('opacity-val').innerText = Math.round(s.opacity * 100) + '%';
        document.getElementById('contrast-val').innerText = s.contrast + '%';
        const isUser = currentTarget === 'user';
        document.getElementById('opacity-control').style.opacity = isUser ? '1' : '0.4';
        document.getElementById('active-target-label').innerText = isUser ? 'Настройка рисунка' : 'Настройка референса';
    }

    function checkAutoTarget() {
        if (!isUserLoaded) currentTarget = 'ref';
        else currentTarget = (isUserVisible && states.user.opacity > 0) ? 'user' : 'ref';
        syncSlidersToCurrentTarget();
    }

    function toggleLink() { resetIdleTimer(); isLinked = !isLinked; document.getElementById('btn-link').classList.toggle('active-btn', isLinked); }

    function toggleUserVisibility() {
        resetIdleTimer();
        isUserVisible = !isUserVisible;
        eyeIcon.innerHTML = isUserVisible ? 
            '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>' :
            '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        applyFiltersToElements();
        checkAutoTarget();
    }

    function toggleCustomPivot() { resetIdleTimer(); isCustomPivot = !isCustomPivot; updatePivotUI(); }
    function updatePivotUI() {
        pivotEl.style.display = isCustomPivot ? 'block' : 'none';
        pivotEl.style.left = pivot.x + 'px';
        pivotEl.style.top = pivot.y + 'px';
        document.getElementById('btn-pivot-toggle').classList.toggle('active-target', isCustomPivot);
    }

    function fitImageToScreen(img, key) {
        const sw = window.innerWidth, sh = window.innerHeight;
        const scale = Math.min(sw / img.naturalWidth, sh / img.naturalHeight) * 0.9;
        states[key] = { ...states[key], x: sw/2, y: sh/2, s: scale, r: 0 };
        applyTransforms();
    }

    function loadFile(input, id) {
        if (input.files?.[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
                img.onload = () => {
                    fitImageToScreen(img, id.includes('ref') ? 'ref' : 'user');
                    if (id.includes('user')) {
                        isUserLoaded = true;
                        document.getElementById('placeholder').style.display = 'none';
                    }
                    checkAutoTarget();
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateFilters() {
        const op = parseInt(document.getElementById('opacity-slider').value);
        const co = parseInt(document.getElementById('contrast-slider').value);
        if (currentTarget === 'user') states.user.opacity = op / 100;
        states[currentTarget].contrast = co;
        applyFiltersToElements();
        syncSlidersToCurrentTarget();
        if (currentTarget === 'user' && op === 0) checkAutoTarget();
    }

    function applyFiltersToElements() {
        refEl.style.filter = `contrast(${states.ref.contrast}%) brightness(${states.ref.brightness}%)`;
        userEl.style.opacity = isUserVisible ? states.user.opacity : '0';
        userEl.style.filter = `contrast(${states.user.contrast}%) brightness(${states.user.brightness}%)`;
    }

    function applyTransforms() {
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        [refEl, userEl].forEach((el, i) => {
            const s = states[i === 0 ? 'ref' : 'user'];
            el.style.transform = `translate(-50%, -50%) translate(${s.x - cx}px, ${s.y - cy}px) rotate(${s.r}deg) scale(${s.s})`;
        });
    }

    function startNudge(key, val) {
        resetIdleTimer(); stopNudge();
        const perform = () => {
            const targets = isLinked ? ['ref', 'user'] : [currentTarget];
            const px = isCustomPivot ? pivot.x : window.innerWidth/2;
            const py = isCustomPivot ? pivot.y : window.innerHeight/2;
            targets.forEach(t => {
                const s = states[t];
                if (key === 'x') s.x += val;
                if (key === 'y') s.y += val;
                if (key === 'r') {
                    const dx = s.x - px, dy = s.y - py;
                    const rad = val * Math.PI / 180;
                    const cos = Math.cos(rad), sin = Math.sin(rad);
                    s.x = px + (dx * cos - dy * sin); s.y = py + (dx * sin + dy * cos); s.r += val;
                }
                if (key === 's') { s.x = px + (s.x - px) * val; s.y = py + (s.y - py) * val; s.s *= val; }
            });
            applyTransforms();
        };
        perform(); nudgeInterval = setInterval(perform, 30);
    }
    function stopNudge() { if (nudgeInterval) clearInterval(nudgeInterval); }

    function resetIdleTimer() {
        appContainer.classList.remove('ui-hidden-state');
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(() => { if (!drawer.classList.contains('open')) appContainer.classList.add('ui-hidden-state'); }, IDLE_TIME);
    }

    const zone = document.getElementById('interaction-zone');
    zone.addEventListener('pointerdown', e => {
        resetIdleTimer();
        if (e.target.closest('#drawer') || e.target.closest('.edge-btn-container')) return;
        if (isCustomPivot) { pivot = { x: e.clientX, y: e.clientY }; updatePivotUI(); activePointers.set(e.pointerId, 'pivot'); }
        else activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    });
    zone.addEventListener('pointermove', e => {
        if (!activePointers.has(e.pointerId)) return;
        resetIdleTimer();
        if (activePointers.get(e.pointerId) === 'pivot') { pivot = { x: e.clientX, y: e.clientY }; updatePivotUI(); return; }
        const targets = isLinked ? ['ref', 'user'] : [currentTarget];
        if (activePointers.size === 1) {
            const prev = activePointers.get(e.pointerId);
            const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
            targets.forEach(t => { states[t].x += dx; states[t].y += dy; });
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        }
        applyTransforms();
    });
    zone.addEventListener('pointerup', e => activePointers.delete(e.pointerId));

    function toggleGrid() { 
        resetIdleTimer(); 
        const isHidden = document.getElementById('grid-overlay').classList.toggle('hidden'); 
        document.getElementById('btn-grid-toggle-main').classList.toggle('active-target', !isHidden);
        if (!isHidden) drawGrid();
    }
    function drawGrid() {
        const svg = document.getElementById('grid-overlay');
        const w = window.innerWidth, h = window.innerHeight;
        svg.innerHTML = '';
        const step = w / 10;
        for(let i=0; i<=w; i+=step) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", i); l.setAttribute("y1", 0); l.setAttribute("x2", i); l.setAttribute("y2", h);
            l.setAttribute("stroke", "rgba(255,255,255,0.2)"); svg.appendChild(l);
        }
        for(let i=0; i<=h; i+=step) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", 0); l.setAttribute("y1", i); l.setAttribute("x2", w); l.setAttribute("y2", i);
            l.setAttribute("stroke", "rgba(255,255,255,0.2)"); svg.appendChild(l);
        }
    }

    function resetAll() {
        if (refEl.src) fitImageToScreen(refEl, 'ref');
        if (userEl.src) fitImageToScreen(userEl, 'user');
        states.user.opacity = 0.8;
        applyFiltersToElements();
        syncSlidersToCurrentTarget();
    }

    window.addEventListener('load', () => { drawGrid(); applyTransforms(); updatePivotUI(); resetIdleTimer(); });
</script>
</body>
</html>
