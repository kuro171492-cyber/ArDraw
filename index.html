<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Stencil Pro</title>
    <!-- Подключение стабильных версий библиотек -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        .ui-overlay { z-index: 1000; position: absolute; }
        
        .mindar-ui-overlay { z-index: 500 !important; }
        video { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
        }

        #setup-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: white;
        }

        #target-preview {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 24px;
            z-index: 2000; text-align: center; color: black;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 90%;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px; width: 24px;
            border-radius: 50%; background: #ffffff;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Шаг 1: Экран настройки -->
    <div id="setup-screen">
        <div class="mb-8 p-6 bg-white/5 rounded-3xl border border-white/10">
            <div class="w-16 h-16 mx-auto mb-4 bg-blue-500/20 rounded-2xl flex items-center justify-center">
                <i data-lucide="image" class="text-blue-400 w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2 text-white">AR Трафарет</h1>
            <p class="text-gray-400 text-sm">Выберите фото для перерисовки</p>
        </div>
        
        <label class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold transition-all cursor-pointer active:scale-95 shadow-xl shadow-blue-900/20">
            Выбрать изображение
            <input type="file" id="imageLoader" accept="image/*" class="hidden">
        </label>
        
        <div id="selected-preview" class="mt-8 hidden">
            <img id="img-thumb" src="" class="w-24 h-24 object-cover rounded-xl border-2 border-blue-500/50 mx-auto">
            <button id="start-ar-btn" class="mt-6 bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-2xl font-bold transition-all block mx-auto">
                Открыть камеру
            </button>
        </div>
    </div>

    <!-- Интерфейс AR -->
    <div id="ar-ui" class="ui-overlay inset-0 pointer-events-none flex flex-col justify-between p-6 opacity-0 transition-opacity duration-500">
        <div class="flex justify-between items-start pointer-events-auto">
            <div id="statusTag" class="bg-black/60 backdrop-blur-xl border border-white/20 px-4 py-2 rounded-full flex items-center gap-2">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></div>
                <span id="statusText" class="text-xs font-bold uppercase tracking-widest text-white">Поиск маркера...</span>
            </div>
            <button id="helpBtn" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white border border-white/20 font-bold">?</button>
        </div>

        <div class="bg-black/70 backdrop-blur-2xl border border-white/10 p-6 rounded-[2.5rem] pointer-events-auto flex flex-col gap-5 shadow-2xl text-white">
            <div class="flex items-center justify-between gap-4">
                <div class="flex-1 flex flex-col gap-2">
                    <div class="flex justify-between text-[10px] text-white/50 uppercase font-bold">
                        <span>Прозрачность</span>
                        <span id="opacityLabel">50%</span>
                    </div>
                    <input type="range" id="opacityRange" min="0" max="1" step="0.01" value="0.5" class="w-full h-1.5 bg-white/20 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="flex gap-2">
                   <button id="minusBtn" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-white/10 text-xl font-bold">−</button>
                   <button id="plusBtn" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center border border-white/10 text-xl font-bold">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Инструкция -->
    <div id="target-preview">
        <h3 class="font-bold text-lg mb-2">Наведите на маркер</h3>
        <p class="text-sm text-gray-500 mb-6">Положите это изображение рядом с листом бумаги.</p>
        <img src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" crossorigin="anonymous" class="w-56 mx-auto mb-6 rounded-2xl shadow-xl">
        <button id="closeHelpBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Понятно</button>
    </div>

    <!-- AR Сцена -->
    <a-scene 
        id="main-scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiScanning: no;" 
        embedded
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets id="assets-list">
            <!-- Динамический ассет будет вставлен сюда -->
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-image id="ar-image" 
                position="0 0 0.02" 
                height="1" 
                width="1" 
                opacity="0.5" 
                transparent="true"
                material="depthTest: false; shader: flat; side: double">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        const imageLoader = document.getElementById('imageLoader');
        const arImage = document.getElementById('ar-image');
        const imgThumb = document.getElementById('img-thumb');
        const setupScreen = document.getElementById('setup-screen');
        const startArBtn = document.getElementById('start-ar-btn');
        const selectedPreview = document.getElementById('selected-preview');
        const arUi = document.getElementById('ar-ui');
        const sceneEl = document.querySelector('a-scene');
        const assetsList = document.getElementById('assets-list');
        
        const opacityRange = document.getElementById('opacityRange');
        const opacityLabel = document.getElementById('opacityLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const targetEntity = document.getElementById('ar-target');
        const preview = document.getElementById('target-preview');

        let currentScale = 1;

        // Загрузка изображения
        imageLoader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                imgThumb.src = url;
                selectedPreview.classList.remove('hidden');
                
                // Создаем ассет для A-Frame
                assetsList.innerHTML = '';
                const imgAsset = document.createElement('img');
                imgAsset.id = 'user-stencil';
                imgAsset.src = url;
                imgAsset.crossOrigin = "anonymous";
                assetsList.appendChild(imgAsset);

                imgAsset.onload = () => {
                    const ratio = imgAsset.width / imgAsset.height;
                    arImage.setAttribute('width', ratio);
                    arImage.setAttribute('height', 1);
                    arImage.setAttribute('src', '#user-stencil');
                };
            }
        });

        // Запуск AR
        startArBtn.addEventListener('click', () => {
            setupScreen.style.opacity = '0';
            setTimeout(() => {
                setupScreen.style.display = 'none';
                preview.style.display = 'block';
                
                try {
                    const arSystem = sceneEl.systems["mindar-image-system"];
                    if (arSystem) {
                        // Принудительно запускаем систему
                        arSystem.start(); 
                        
                        // Попытка принудительно запустить видео, если оно зависло
                        setTimeout(() => {
                            const video = document.querySelector('video');
                            if (video) video.play().catch(() => {});
                        }, 1000);
                    }
                } catch (err) {
                    console.error("AR Start Error:", err);
                }
                
                arUi.classList.remove('opacity-0');
                arUi.style.opacity = '1';
            }, 500);
        });

        document.getElementById('closeHelpBtn').onclick = () => preview.style.display = 'none';
        document.getElementById('helpBtn').onclick = () => preview.style.display = 'block';

        opacityRange.addEventListener('input', (e) => {
            const val = e.target.value;
            arImage.setAttribute('opacity', val);
            opacityLabel.innerText = Math.round(val * 100) + '%';
        });

        document.getElementById('plusBtn').onclick = () => {
            currentScale *= 1.1;
            arImage.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        };
        document.getElementById('minusBtn').onclick = () => {
            currentScale *= 0.9;
            arImage.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        };

        // События MindAR
        targetEntity.addEventListener("targetFound", () => {
            statusDot.classList.replace('bg-amber-500', 'bg-green-500');
            statusDot.classList.remove('animate-pulse');
            statusText.innerText = "Закреплено";
        });

        targetEntity.addEventListener("targetLost", () => {
            statusDot.classList.replace('bg-green-500', 'bg-amber-500');
            statusDot.classList.add('animate-pulse');
            statusText.innerText = "Поиск маркера...";
        });

        // Обработка глобальных ошибок для предотвращения падения скрипта
        window.onerror = function(msg, url, line) {
            console.warn("Caught Script Error:", msg, "at", url, ":", line);
            return true; // Предотвращает вывод ошибки в консоль Canvas
        };
    </script>
</body>
</html>
