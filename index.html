<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArtRef - Помощник Художника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #FF5F5F;
            --bg-dark: #111;
        }
        body {
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            margin: 0;
            color: white;
            position: fixed;
            width: 100vw;
            height: 100dvh; 
        }
        .app-container {
            width: 100vw;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }
        .canvas-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        #placeholder {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .img-layer {
            position: absolute;
            left: 50%; top: 50%;
            transform-origin: 50% 50%;
            max-width: none;
            max-height: none;
            pointer-events: none;
            display: none;
            will-change: transform, filter, opacity;
            transition: opacity 0.2s ease;
        }
        #ref-image { z-index: 2; filter: none !important; }
        #user-image { z-index: 3; }

        .settings-drawer {
            position: absolute;
            top: 0; right: 0; width: 300px; height: 100%;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            color: #333;
        }
        @media (max-width: 640px) { .settings-drawer { width: 85%; } }
        .settings-drawer.open { transform: translateX(0); }
        
        .drawer-handle {
            position: absolute;
            left: -48px; top: 80px; width: 48px; height: 48px;
            background: white; border-radius: 12px 0 0 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary);
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }

        #pivot-point {
            position: absolute;
            width: 44px; height: 44px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            z-index: 60;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            display: none;
            background: rgba(255, 95, 95, 0.1);
        }
        #pivot-point::before, #pivot-point::after {
            content: ''; position: absolute; background: var(--primary);
        }
        #pivot-point::before { top: 50%; left: -10px; right: -10px; height: 1px; transform: translateY(-50%); }
        #pivot-point::after { left: 50%; top: -10px; bottom: -10px; width: 1px; transform: translateX(-50%); }

        .perimeter-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        
        .edge-btn {
            width: 48px;
            height: 48px;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.1s, background 0.1s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .edge-btn:active { transform: scale(0.95); background: var(--primary); }
        .edge-btn svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; }
        
        .edge-btn.active-target { border-color: var(--primary); background: rgba(255, 95, 95, 0.2); }
        .edge-btn.active-target svg { stroke: var(--primary); }
        .edge-btn.hidden-state svg { stroke: #666; }

        .p-top-left { 
            position: absolute; 
            top: max(16px, env(safe-area-inset-top)); 
            left: max(16px, env(safe-area-inset-left)); 
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        
        .p-top-center { 
            position: absolute; 
            top: max(16px, env(safe-area-inset-top)); 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            pointer-events: none;
        }

        .p-top-right { position: absolute; top: max(16px, env(safe-area-inset-top)); right: max(16px, env(safe-area-inset-right)); }
        
        .p-mid-left { position: absolute; top: 50%; left: max(16px, env(safe-area-inset-left)); transform: translateY(-50%); }
        .p-mid-right { position: absolute; top: 50%; right: max(16px, env(safe-area-inset-right)); transform: translateY(-50%); }
        
        .p-bottom-left { position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); left: max(16px, env(safe-area-inset-left)); }
        .p-bottom-right { position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); right: max(16px, env(safe-area-inset-right)); }
        
        .p-bottom-center {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            pointer-events: none;
        }

        .active-btn { background-color: var(--primary) !important; color: white !important; }
        .grid-line { stroke-width: 1; transition: stroke 0.2s; }

        .color-dot {
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1); transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .color-dot.active { border: 2px solid var(--primary); transform: scale(1.1); }
        
        .setting-dot { width: 28px; height: 28px; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container" id="interaction-zone">
    <div class="canvas-area">
        <div id="placeholder" class="text-gray-500 text-center pointer-events-none px-6 w-full">
            <p class="text-xl font-bold mb-2">ArtRef</p>
            <p class="text-xs opacity-70 uppercase tracking-widest">Меню: свайп влево</p>
        </div>
        <img id="ref-image" class="img-layer" alt="Ref">
        <img id="user-image" class="img-layer" alt="User">
        <svg id="grid-overlay" class="absolute inset-0 pointer-events-none z-10 hidden w-full h-full"></svg>
    </div>

    <div id="pivot-point"></div>

    <!-- ПАНЕЛЬ ТОЧНОГО ПЕРЕМЕЩЕНИЯ -->
    <div id="perimeter-panel" class="perimeter-panel">
        <div class="p-top-left">
            <div class="edge-btn" onpointerdown="startNudge('r', -0.5)" onpointerup="stopNudge()">
                <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </div>
            <div id="btn-grid-toggle-main" class="edge-btn" onclick="toggleGrid()">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
            </div>
        </div>
        
        <div class="p-top-center">
            <div class="edge-btn" onpointerdown="startNudge('y', -2)" onpointerup="stopNudge()">
                <svg viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
            </div>
            <div id="btn-visibility-toggle" class="edge-btn" onclick="toggleUserVisibility()">
                <svg id="eye-icon" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>
        </div>

        <div class="edge-btn p-top-right" onpointerdown="startNudge('r', 0.5)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24" style="transform: scaleX(-1)"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </div>

        <div class="edge-btn p-mid-left" onpointerdown="startNudge('x', -2)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </div>
        <div class="edge-btn p-mid-right" onpointerdown="startNudge('x', 2)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </div>

        <div class="edge-btn p-bottom-left" onpointerdown="startNudge('s', 0.995)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
        </div>
        
        <div class="p-bottom-center">
            <div id="btn-pivot-toggle" class="edge-btn active-target" onclick="toggleCustomPivot()">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 2v20M2 12h20"/></svg>
            </div>
            <div class="edge-btn" onpointerdown="startNudge('y', 2)" onpointerup="stopNudge()">
                <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
            </div>
        </div>

        <div class="edge-btn p-bottom-right" onpointerdown="startNudge('s', 1.005)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </div>
    </div>

    <!-- МЕНЮ НАСТРОЕК -->
    <aside id="drawer" class="settings-drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg id="drawer-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        <div class="p-6 h-full overflow-y-auto space-y-6">
            <h2 class="text-xl font-bold border-b pb-2">Настройки</h2>
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Загрузка</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold uppercase">Референс</button>
                    <button onclick="document.getElementById('user-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold uppercase">Рисунок</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="loadFile(this, 'ref-image')">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="loadFile(this, 'user-image')">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button id="btn-link" onclick="toggleLink()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl transition-colors">
                    <svg class="mb-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    <span class="text-[9px] font-bold uppercase">Связка</span>
                </button>
                <button id="btn-precision" onclick="togglePrecision()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl transition-colors">
                    <svg class="mb-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m12 8 4 4-4 4"/></svg>
                    <span class="text-[9px] font-bold uppercase">Точность</span>
                </button>
            </div>

            <div class="space-y-4 border-t pt-4">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Настройка Рисунка</label>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-medium text-gray-400 uppercase">Прозрачность</span>
                        <span id="opacity-val" class="text-xs font-bold text-red-500">80%</span>
                    </div>
                    <input type="range" id="opacity-slider" min="0" max="100" value="80" class="w-full accent-red-500" oninput="updateFilters()">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-medium text-gray-400 uppercase">Контраст</span>
                        <span id="contrast-val" class="text-xs font-bold text-red-500">100%</span>
                    </div>
                    <input type="range" id="contrast-slider" min="50" max="300" value="100" class="w-full accent-red-500" oninput="updateFilters()">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-medium text-gray-400 uppercase">Яркость</span>
                        <span id="brightness-val" class="text-xs font-bold text-red-500">100%</span>
                    </div>
                    <input type="range" id="brightness-slider" min="0" max="200" value="100" class="w-full accent-red-500" oninput="updateFilters()">
                </div>

                <div class="space-y-4 pt-2 border-t">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold uppercase text-gray-500">Сетка</span>
                        <input type="checkbox" id="grid-toggle" class="w-4 h-4 accent-red-500" onchange="toggleGrid()">
                    </div>
                    
                    <div class="space-y-2">
                        <span class="text-[10px] font-medium text-gray-400 uppercase">Размер</span>
                        <input type="range" id="grid-size" min="4" max="30" value="10" class="w-full accent-gray-400" oninput="drawGrid()">
                    </div>

                    <div class="space-y-2">
                        <span class="text-[10px] font-medium text-gray-400 uppercase">Цвет сетки</span>
                        <div class="flex justify-between items-center px-1">
                            <div class="color-dot setting-dot bg-white border border-gray-200 active" data-grid-color="rgba(255,255,255,0.3)" onclick="setGridColor(this, 'rgba(255,255,255,0.3)')"></div>
                            <div class="color-dot setting-dot bg-black" data-grid-color="rgba(0,0,0,0.4)" onclick="setGridColor(this, 'rgba(0,0,0,0.4)')"></div>
                            <div class="color-dot setting-dot bg-red-500" data-grid-color="rgba(239,68,68,0.4)" onclick="setGridColor(this, 'rgba(239,68,68,0.4)')"></div>
                            <div class="color-dot setting-dot bg-blue-500" data-grid-color="rgba(59,130,246,0.4)" onclick="setGridColor(this, 'rgba(59,130,246,0.4)')"></div>
                            <div class="color-dot setting-dot bg-green-500" data-grid-color="rgba(34,197,94,0.4)" onclick="setGridColor(this, 'rgba(34,197,94,0.4)')"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="resetAll()" class="w-full py-3 text-red-500 font-bold text-[10px] border border-red-100 rounded-xl hover:bg-red-50 uppercase tracking-widest">Сброс положения</button>
        </div>
    </aside>
</div>

<script>
    let states = {
        ref: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 },
        user: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 }
    };
    
    let isLinked = false;
    let isPrecisionMode = false;
    let isCustomPivot = true; 
    let isUserVisible = true;
    let userLineColor = 'none';
    let gridStrokeColor = 'rgba(255,255,255,0.3)';
    
    let pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let activePointers = new Map();
    let nudgeInterval = null;

    const refEl = document.getElementById('ref-image');
    const userEl = document.getElementById('user-image');
    const pivotEl = document.getElementById('pivot-point');
    const drawer = document.getElementById('drawer');
    const perimeterPanel = document.getElementById('perimeter-panel');
    const eyeIcon = document.getElementById('eye-icon');

    function toggleDrawer(open) {
        if (typeof open === 'boolean') drawer.classList.toggle('open', open);
        else drawer.classList.toggle('open');
    }

    let touchStartX = 0;
    window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
    window.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].screenX - touchStartX;
        if (drawer.classList.contains('open') && dx > 60) toggleDrawer(false);
        if (!drawer.classList.contains('open') && dx < -60 && touchStartX > window.innerWidth * 0.7) toggleDrawer(true);
    }, {passive: true});

    function toggleLink() {
        isLinked = !isLinked;
        document.getElementById('btn-link').classList.toggle('active-btn', isLinked);
    }

    function togglePrecision() {
        isPrecisionMode = !isPrecisionMode;
        document.getElementById('btn-precision').classList.toggle('active-btn', isPrecisionMode);
        perimeterPanel.style.display = isPrecisionMode ? 'block' : 'none';
        updatePivotUI();
    }

    function toggleUserVisibility() {
        isUserVisible = !isUserVisible;
        const btn = document.getElementById('btn-visibility-toggle');
        
        if (isUserVisible) {
            btn.classList.remove('hidden-state');
            userEl.style.opacity = document.getElementById('opacity-slider').value / 100;
            eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        } else {
            btn.classList.add('hidden-state');
            userEl.style.opacity = '0';
            eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        }
    }

    function toggleCustomPivot() {
        isCustomPivot = !isCustomPivot;
        updatePivotUI();
    }

    function updatePivotUI() {
        if (isPrecisionMode && isCustomPivot) {
            pivotEl.style.display = 'block';
            pivotEl.style.left = pivot.x + 'px';
            pivotEl.style.top = pivot.y + 'px';
            document.getElementById('btn-pivot-toggle').classList.add('active-target');
        } else {
            pivotEl.style.display = 'none';
            document.getElementById('btn-pivot-toggle').classList.remove('active-target');
        }
    }

    function loadFile(input, id) {
        if (input.files?.[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
                const pl = document.getElementById('placeholder');
                if (pl) pl.style.display = 'none';
                applyTransforms();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateFilters() {
        const opacityEl = document.getElementById('opacity-slider');
        const contrastEl = document.getElementById('contrast-slider');
        const brightnessEl = document.getElementById('brightness-slider');
        if (!opacityEl || !contrastEl || !brightnessEl) return;

        const userOpacity = opacityEl.value;
        const userContrast = contrastEl.value;
        const userBrightness = brightnessEl.value;
        
        document.getElementById('opacity-val').innerText = userOpacity + '%';
        document.getElementById('contrast-val').innerText = userContrast + '%';
        document.getElementById('brightness-val').innerText = userBrightness + '%';

        let filterString = `contrast(${userContrast}%) brightness(${userBrightness}%)`;
        if (userLineColor === 'white') {
            filterString += " invert(1) brightness(2) contrast(150%)";
        }
        
        if (isUserVisible) {
            userEl.style.opacity = userOpacity / 100;
        }
        userEl.style.filter = filterString;
    }

    function setLineColor(dot, color) {
        dot.parentNode.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        userLineColor = color;
        updateFilters();
    }

    function setGridColor(dot, color) {
        dot.parentNode.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        gridStrokeColor = color;
        drawGrid();
    }

    function applyTransforms() {
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        [refEl, userEl].forEach((el, index) => {
            const key = index === 0 ? 'ref' : 'user';
            const s = states[key];
            if (!s) return;
            el.style.transform = `translate(-50%, -50%) translate(${s.x - cx}px, ${s.y - cy}px) rotate(${s.r}deg) scale(${s.s})`;
        });
    }

    function startNudge(key, val) {
        stopNudge();
        const perform = () => {
            const targets = isLinked ? ['ref', 'user'] : ['user'];
            const activePivotX = (isPrecisionMode && isCustomPivot) ? pivot.x : window.innerWidth/2;
            const activePivotY = (isPrecisionMode && isCustomPivot) ? pivot.y : window.innerHeight/2;
            targets.forEach(t => {
                const s = states[t];
                if (key === 'x') s.x += val;
                if (key === 'y') s.y += val;
                if (key === 'r') {
                    const dx = s.x - activePivotX, dy = s.y - activePivotY;
                    const angle = Math.atan2(dy, dx) + (val * Math.PI / 180);
                    const dist = Math.hypot(dx, dy);
                    s.x = activePivotX + dist * Math.cos(angle);
                    s.y = activePivotY + dist * Math.sin(angle);
                    s.r += val;
                }
                if (key === 's') {
                    s.x = activePivotX + (s.x - activePivotX) * val;
                    s.y = activePivotY + (s.y - activePivotY) * val;
                    s.s *= val;
                }
            });
            applyTransforms();
        };
        perform();
        nudgeInterval = setInterval(perform, 30);
    }

    function stopNudge() { if (nudgeInterval) clearInterval(nudgeInterval); }

    const zone = document.getElementById('interaction-zone');
    let initialDist = 0, initialAngle = 0;

    zone.addEventListener('pointerdown', e => {
        if (e.target.closest('#drawer') || e.target.closest('.edge-btn')) return;
        if (isPrecisionMode && isCustomPivot) {
            pivot = { x: e.clientX, y: e.clientY };
            updatePivotUI();
            activePointers.set(e.pointerId, 'pivot');
            return;
        }
        activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (activePointers.size === 2) {
            const pts = Array.from(activePointers.values());
            initialDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            initialAngle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
        }
    });

    zone.addEventListener('pointermove', e => {
        if (!activePointers.has(e.pointerId)) return;
        if (activePointers.get(e.pointerId) === 'pivot') {
            pivot = { x: e.clientX, y: e.clientY };
            updatePivotUI();
            return;
        }

        const targets = isLinked ? ['ref', 'user'] : ['user'];
        if (activePointers.size === 1) {
            const prev = activePointers.get(e.pointerId);
            if (prev === 'pivot') return; 
            const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
            targets.forEach(t => { states[t].x += dx; states[t].y += dy; });
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        } else if (activePointers.size === 2) {
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            const pts = Array.from(activePointers.values()).filter(p => p !== 'pivot');
            if (pts.length < 2) return;
            const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            const angle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
            
            const sFact = initialDist > 0 ? dist / initialDist : 1;
            const aDiff = isLinked ? 0 : (angle - initialAngle);
            
            targets.forEach(t => { states[t].s *= sFact; states[t].r += aDiff; });
            initialDist = dist; initialAngle = angle;
        }
        applyTransforms();
    });

    zone.addEventListener('pointerup', e => activePointers.delete(e.pointerId));
    zone.addEventListener('pointercancel', e => activePointers.delete(e.pointerId));

    function toggleGrid() {
        const svg = document.getElementById('grid-overlay');
        const isHidden = svg.classList.toggle('hidden');
        
        const toggleEl = document.getElementById('grid-toggle');
        if (toggleEl) toggleEl.checked = !isHidden;
        
        const mainBtn = document.getElementById('btn-grid-toggle-main');
        if (mainBtn) {
            mainBtn.classList.toggle('active-target', !isHidden);
        }
        
        if (!isHidden) drawGrid();
    }

    function drawGrid() {
        const sizeEl = document.getElementById('grid-size');
        if (!sizeEl) return;
        const size = sizeEl.value;
        const svg = document.getElementById('grid-overlay');
        const w = window.innerWidth, h = window.innerHeight;
        svg.innerHTML = '';
        const step = w / size;
        for(let x=0; x<=w; x+=step) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", x); l.setAttribute("y1", 0); l.setAttribute("x2", x); l.setAttribute("y2", h);
            l.setAttribute("class", "grid-line"); l.style.stroke = gridStrokeColor;
            svg.appendChild(l);
        }
        for(let y=0; y<=h; y+=step) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", 0); l.setAttribute("y1", y); l.setAttribute("x2", w); l.setAttribute("y2", y);
            l.setAttribute("class", "grid-line"); l.style.stroke = gridStrokeColor;
            svg.appendChild(l);
        }
    }

    function resetAll() {
        states.ref = { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 };
        states.user = { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 };
        
        const opacityEl = document.getElementById('opacity-slider');
        const contrastEl = document.getElementById('contrast-slider');
        const brightnessEl = document.getElementById('brightness-slider');
        
        if (opacityEl) opacityEl.value = 80;
        if (contrastEl) contrastEl.value = 100;
        if (brightnessEl) brightnessEl.value = 100;
        
        userLineColor = 'none';
        isUserVisible = true;
        const visibilityBtn = document.getElementById('btn-visibility-toggle');
        if (visibilityBtn) visibilityBtn.classList.remove('hidden-state');
        
        const svg = document.getElementById('grid-overlay');
        svg.classList.add('hidden');
        const gridToggle = document.getElementById('grid-toggle');
        if (gridToggle) gridToggle.checked = false;
        
        const mainBtn = document.getElementById('btn-grid-toggle-main');
        if (mainBtn) mainBtn.classList.remove('active-target');

        updateFilters();
        applyTransforms();
        drawGrid();
    }

    window.addEventListener('load', () => {
        drawGrid();
        applyTransforms();
    });
    window.addEventListener('resize', () => { drawGrid(); applyTransforms(); });
</script>
</body>
