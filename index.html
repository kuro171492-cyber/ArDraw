<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArtRef - Помощник Художника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #FF5F5F;
            --bg-dark: #111;
        }
        body {
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            margin: 0;
            color: white;
            position: fixed;
            width: 100vw;
            height: 100dvh; 
        }
        .app-container {
            width: 100vw;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }
        .canvas-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        #placeholder {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .img-layer {
            position: absolute;
            left: 50%; top: 50%;
            transform-origin: 50% 50%;
            max-width: none;
            max-height: none;
            pointer-events: none;
            display: none;
            will-change: transform, filter, opacity;
            transition: opacity 0.2s ease;
        }
        #ref-image { z-index: 2; }
        #user-image { z-index: 3; }

        .settings-drawer {
            position: absolute;
            top: 0; right: 0; width: 300px; height: 100%;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            color: #333;
        }
        @media (max-width: 640px) { .settings-drawer { width: 85%; } }
        .settings-drawer.open { transform: translateX(0); }
        
        .drawer-handle {
            position: absolute;
            left: -48px; top: 80px; width: 48px; height: 48px;
            background: white; border-radius: 12px 0 0 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary);
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            pointer-events: auto;
        }

        .drawer-handle svg {
            transition: transform 0.3s ease;
        }
        .settings-drawer.open #drawer-icon {
            transform: rotate(180deg);
        }

        #pivot-point {
            position: absolute;
            width: 44px; height: 44px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            z-index: 60;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            display: none;
            background: rgba(255, 95, 95, 0.1);
        }

        .perimeter-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        
        .edge-btn {
            width: 48px; height: 48px;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.1s, background 0.1s, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .edge-btn:active { transform: scale(0.95); background: var(--primary); }
        .edge-btn svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; }
        .edge-btn.active-target { border-color: var(--primary); background: rgba(255, 95, 95, 0.2); }

        /* Позиционирование кнопок управления */
        .p-top-left { position: absolute; top: max(16px, env(safe-area-inset-top)); left: max(16px, env(safe-area-inset-left)); display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .p-top-center { position: absolute; top: max(16px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; }
        .p-top-right { position: absolute; top: max(16px, env(safe-area-inset-top)); right: max(16px, env(safe-area-inset-right)); }
        .p-mid-left { position: absolute; top: 50%; left: max(16px, env(safe-area-inset-left)); transform: translateY(-50%); }
        .p-mid-right { position: absolute; top: 50%; right: max(16px, env(safe-area-inset-right)); transform: translateY(-50%); }
        .p-bottom-left { position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); left: max(16px, env(safe-area-inset-left)); }
        .p-bottom-right { position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); right: max(16px, env(safe-area-inset-right)); }
        .p-bottom-center { position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; }

        .active-btn { background-color: var(--primary) !important; color: white !important; }
        .grid-line { stroke-width: 1; transition: stroke 0.2s; }

        .target-indicator {
            position: absolute;
            bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 40;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }

        .btn-disabled { opacity: 0.4; cursor: not-allowed !important; filter: grayscale(1); }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="app-container" id="interaction-zone">
    <div class="canvas-area">
        <div id="placeholder" class="text-gray-500 text-center pointer-events-none px-6 w-full">
            <p class="text-xl font-bold mb-1">ArtRef</p>
            <p class="text-[10px] opacity-70 uppercase tracking-widest">Загрузите референс для начала</p>
        </div>
        <img id="ref-image" class="img-layer" alt="Ref">
        <img id="user-image" class="img-layer" alt="User">
        <svg id="grid-overlay" class="absolute inset-0 pointer-events-none z-10 hidden w-full h-full"></svg>
    </div>

    <div id="pivot-point"></div>
    <div id="target-ui" class="target-indicator">Ожидание...</div>

    <!-- ПАНЕЛЬ ТОЧНОГО ПЕРЕМЕЩЕНИЯ -->
    <div id="perimeter-panel" class="perimeter-panel">
        <div class="p-top-left">
            <div class="edge-btn" onpointerdown="startNudge('r', -0.5)" onpointerup="stopNudge()">
                <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </div>
            <div id="btn-grid-toggle-main" class="edge-btn" onclick="toggleGrid()">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
            </div>
        </div>
        
        <div class="p-top-center">
            <div class="edge-btn" onpointerdown="startNudge('y', -2)" onpointerup="stopNudge()">
                <svg viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
            </div>
            <div id="btn-visibility-toggle" class="edge-btn" onclick="toggleUserVisibility()">
                <svg id="eye-icon" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </div>
        </div>

        <div class="edge-btn p-top-right" onpointerdown="startNudge('r', 0.5)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24" style="transform: scaleX(-1)"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </div>

        <div class="edge-btn p-mid-left" onpointerdown="startNudge('x', -2)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </div>
        <div class="edge-btn p-mid-right" onpointerdown="startNudge('x', 2)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </div>

        <div class="edge-btn p-bottom-left" onpointerdown="startNudge('s', 0.995)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
        </div>
        
        <div class="p-bottom-center">
            <div id="btn-pivot-toggle" class="edge-btn active-target" onclick="toggleCustomPivot()">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 2v20M2 12h20"/></svg>
            </div>
            <div class="edge-btn" onpointerdown="startNudge('y', 2)" onpointerup="stopNudge()">
                <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
            </div>
        </div>

        <div class="edge-btn p-bottom-right" onpointerdown="startNudge('s', 1.005)" onpointerup="stopNudge()">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </div>
    </div>

    <!-- МЕНЮ НАСТРОЕК -->
    <aside id="drawer" class="settings-drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg id="drawer-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="p-6 h-full overflow-y-auto space-y-6">
            <h2 class="text-xl font-bold border-b pb-2 text-gray-800">Настройки</h2>
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Слой управления</label>
                <div class="flex bg-gray-100 p-1 rounded-xl">
                    <!-- Теперь эти кнопки только отображают статус, но переключаются автоматикой -->
                    <div id="target-user" class="flex-1 py-2 text-center text-[10px] font-bold uppercase rounded-lg transition-colors opacity-50">Рисунок</div>
                    <div id="target-ref" class="flex-1 py-2 text-center text-[10px] font-bold uppercase rounded-lg transition-colors active-btn">Референс</div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Файлы</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 border-2 rounded-xl text-[10px] font-bold uppercase text-gray-700">Референс</button>
                    <button id="btn-user-load" onclick="triggerUserLoad()" class="py-3 border-2 rounded-xl text-[10px] font-bold uppercase text-gray-700 btn-disabled">Рисунок</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="loadFile(this, 'ref-image')">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="loadFile(this, 'user-image')">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button id="btn-link" onclick="toggleLink()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl transition-colors text-gray-700">
                    <svg class="mb-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    <span class="text-[9px] font-bold uppercase">Связка</span>
                </button>
                <button id="btn-precision" onclick="togglePrecision()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl transition-colors text-gray-700">
                    <svg class="mb-1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m12 8 4 4-4 4"/></svg>
                    <span class="text-[9px] font-bold uppercase">Точность</span>
                </button>
            </div>

            <div class="space-y-4 border-t pt-4">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Вид Рисунка</label>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-medium text-gray-400 uppercase">Прозрачность</span>
                        <span id="opacity-val" class="text-xs font-bold text-red-500">80%</span>
                    </div>
                    <input type="range" id="opacity-slider" min="0" max="100" value="80" class="w-full accent-red-500" oninput="updateFilters()">
                </div>
                <!-- Другие фильтры... -->
            </div>
            
            <button onclick="resetAll()" class="w-full py-3 text-red-500 font-bold text-[10px] border border-red-100 rounded-xl uppercase tracking-widest">Сброс холста</button>
        </div>
    </aside>
</div>

<script>
    let states = {
        ref: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 },
        user: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0 }
    };
    
    let currentTarget = 'ref'; 
    let isLinked = false;
    let isPrecisionMode = false;
    let isCustomPivot = true; 
    let isUserVisible = true;
    let isRefLoaded = false;
    let isUserLoaded = false;
    
    let pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let activePointers = new Map();
    let nudgeInterval = null;

    const refEl = document.getElementById('ref-image');
    const userEl = document.getElementById('user-image');
    const pivotEl = document.getElementById('pivot-point');
    const drawer = document.getElementById('drawer');
    const perimeterPanel = document.getElementById('perimeter-panel');
    const eyeIcon = document.getElementById('eye-icon');
    const targetIndicator = document.getElementById('target-ui');
    const userLoadBtn = document.getElementById('btn-user-load');

    function toggleDrawer() { drawer.classList.toggle('open'); }

    // ТРИГГЕР ЛОГИКИ ПЕРЕКЛЮЧЕНИЯ
    function autoSwitchTarget() {
        const opacity = parseInt(document.getElementById('opacity-slider').value);
        
        // Условия для режима "Референс":
        // 1. Рисунок не загружен
        // 2. Прозрачность 0
        // 3. Рисунок скрыт кнопкой "глазик"
        const shouldBeRef = !isUserLoaded || opacity === 0 || !isUserVisible;
        
        currentTarget = shouldBeRef ? 'ref' : 'user';
        updateTargetUI();
    }

    function updateTargetUI() {
        const btnUser = document.getElementById('target-user');
        const btnRef = document.getElementById('target-ref');
        
        if (currentTarget === 'user') {
            btnUser.classList.add('active-btn');
            btnUser.classList.remove('opacity-50');
            btnRef.classList.remove('active-btn');
            btnRef.classList.add('opacity-50');
            targetIndicator.innerText = "Управление: Рисунок";
        } else {
            btnRef.classList.add('active-btn');
            btnRef.classList.remove('opacity-50');
            btnUser.classList.remove('active-btn');
            btnUser.classList.add('opacity-50');
            targetIndicator.innerText = "Управление: Референс";
        }
    }

    function triggerUserLoad() {
        if (!isRefLoaded) return;
        document.getElementById('user-input').click();
    }

    function toggleLink() {
        isLinked = !isLinked;
        document.getElementById('btn-link').classList.toggle('active-btn', isLinked);
    }

    function togglePrecision() {
        isPrecisionMode = !isPrecisionMode;
        document.getElementById('btn-precision').classList.toggle('active-btn', isPrecisionMode);
        perimeterPanel.style.display = isPrecisionMode ? 'block' : 'none';
        updatePivotUI();
    }

    function toggleUserVisibility() {
        isUserVisible = !isUserVisible;
        const btn = document.getElementById('btn-visibility-toggle');
        if (isUserVisible) {
            btn.classList.remove('active-target');
            eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        } else {
            btn.classList.add('active-target');
            eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        }
        updateFilters(); // Вызовет авто-переключение
    }

    function toggleCustomPivot() {
        isCustomPivot = !isCustomPivot;
        updatePivotUI();
    }

    function updatePivotUI() {
        if (isPrecisionMode && isCustomPivot) {
            pivotEl.style.display = 'block';
            pivotEl.style.left = pivot.x + 'px';
            pivotEl.style.top = pivot.y + 'px';
            document.getElementById('btn-pivot-toggle').classList.add('active-target');
        } else {
            pivotEl.style.display = 'none';
            document.getElementById('btn-pivot-toggle').classList.remove('active-target');
        }
    }

    function loadFile(input, id) {
        if (input.files?.[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
                img.onload = () => {
                    const key = (id === 'ref-image') ? 'ref' : 'user';
                    fitImageToScreen(img, key);
                    document.getElementById('placeholder').style.display = 'none';
                    if (id === 'ref-image') {
                        isRefLoaded = true;
                        userLoadBtn.classList.remove('btn-disabled');
                    } else {
                        isUserLoaded = true;
                    }
                    autoSwitchTarget();
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function fitImageToScreen(img, key) {
        const scale = Math.min(window.innerWidth / img.naturalWidth, window.innerHeight / img.naturalHeight) * 0.9;
        states[key] = { x: window.innerWidth / 2, y: window.innerHeight / 2, s: scale, r: 0 };
        applyTransforms();
    }

    function updateFilters() {
        const opacity = document.getElementById('opacity-slider').value;
        document.getElementById('opacity-val').innerText = opacity + '%';
        
        if (!isUserVisible) {
            userEl.style.opacity = '0';
        } else {
            userEl.style.opacity = opacity / 100;
        }
        
        autoSwitchTarget();
    }

    function applyTransforms() {
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        [refEl, userEl].forEach((el, index) => {
            const key = index === 0 ? 'ref' : 'user';
            const s = states[key];
            el.style.transform = `translate(-50%, -50%) translate(${s.x - cx}px, ${s.y - cy}px) rotate(${s.r}deg) scale(${s.s})`;
        });
    }

    // ЛОГИКА ТАЧА И ПЕРЕМЕЩЕНИЯ (Упрощенная для читаемости)
    const zone = document.getElementById('interaction-zone');
    zone.addEventListener('pointerdown', e => {
        if (e.target.closest('#drawer') || e.target.closest('.edge-btn')) return;
        if (isPrecisionMode && isCustomPivot) {
            pivot = { x: e.clientX, y: e.clientY };
            updatePivotUI();
            activePointers.set(e.pointerId, 'pivot');
            return;
        }
        activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    });

    zone.addEventListener('pointermove', e => {
        if (!activePointers.has(e.pointerId)) return;
        if (activePointers.get(e.pointerId) === 'pivot') {
            pivot = { x: e.clientX, y: e.clientY };
            updatePivotUI();
            return;
        }

        const targets = isLinked ? ['ref', 'user'] : [currentTarget];
        if (activePointers.size === 1) {
            const prev = activePointers.get(e.pointerId);
            const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
            targets.forEach(t => { states[t].x += dx; states[t].y += dy; });
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            applyTransforms();
        }
    });

    zone.addEventListener('pointerup', e => activePointers.delete(e.pointerId));
    
    // Кнопки точного перемещения
    function startNudge(key, val) {
        stopNudge();
        const perform = () => {
            const targets = isLinked ? ['ref', 'user'] : [currentTarget];
            const pX = (isPrecisionMode && isCustomPivot) ? pivot.x : window.innerWidth/2;
            const pY = (isPrecisionMode && isCustomPivot) ? pivot.y : window.innerHeight/2;
            targets.forEach(t => {
                const s = states[t];
                if (key === 'x') s.x += val;
                if (key === 'y') s.y += val;
                if (key === 's') { s.x = pX + (s.x - pX)*val; s.y = pY + (s.y - pY)*val; s.s *= val; }
                if (key === 'r' && t === 'user') {
                    const dx = s.x - pX, dy = s.y - pY;
                    const rad = val * Math.PI / 180;
                    s.x = pX + (dx * Math.cos(rad) - dy * Math.sin(rad));
                    s.y = pY + (dx * Math.sin(rad) + dy * Math.cos(rad));
                    s.r += val;
                }
            });
            applyTransforms();
        };
        perform();
        nudgeInterval = setInterval(perform, 30);
    }
    function stopNudge() { if (nudgeInterval) clearInterval(nudgeInterval); }

    function resetAll() {
        if (isRefLoaded) fitImageToScreen(refEl, 'ref');
        if (isUserLoaded) fitImageToScreen(userEl, 'user');
        applyTransforms();
    }

    function toggleGrid() {
        const svg = document.getElementById('grid-overlay');
        const isHidden = svg.classList.toggle('hidden');
        document.getElementById('btn-grid-toggle-main').classList.toggle('active-target', !isHidden);
    }

    window.addEventListener('load', () => { updateTargetUI(); applyTransforms(); });
</script>
</body>
</html>
