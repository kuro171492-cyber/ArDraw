<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtRef - Помощник Художника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #FF5F5F;
            --dark-bg: #2D3748;
            --dark-card: #3D4852;
        }
        body {
            background-color: #1a202c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            overflow: hidden;
            margin: 0;
        }
        .app-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            overflow: hidden;
        }
        .canvas-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 1;
        }
        /* Референс всегда снизу или сверху, но с правильным z-index */
        #ref-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 2; /* Реф над рисунком */
        }
        #user-image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            touch-action: none;
            z-index: 3; /* Контейнер рисунка сверху для захвата касаний */
        }
        #user-image {
            max-width: none;
            max-height: none;
            transition: opacity 0.2s;
            transform-origin: center;
            /* По умолчанию рисунок полупрозрачный, чтобы видеть реф под ним */
            opacity: 0.5; 
        }
        #grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        /* Шторка (Sidebar) */
        .settings-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        .settings-drawer.open {
            transform: translateX(0);
        }
        .drawer-handle {
            position: absolute;
            left: -48px;
            top: 20px;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            color: var(--primary);
        }
        input[type="range"] {
            accent-color: var(--primary);
        }
        .grid-line {
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 1;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Main Canvas (Full Screen) -->
    <div class="canvas-area" id="main-view">
        <div id="placeholder-text" class="text-gray-500 text-center p-10 z-0">
            <svg class="mx-auto mb-3" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            Загрузите референс в меню справа
        </div>
        
        <!-- Порядок важен для z-index -->
        <img id="ref-image" class="hidden" alt="Reference">
        
        <div id="user-image-container" class="hidden">
            <img id="user-image" alt="User Work">
        </div>
        
        <svg id="grid-overlay" class="hidden"></svg>
    </div>

    <!-- Floating UI for branding -->
    <div class="fixed top-6 left-6 z-40 flex flex-col">
        <div class="bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-lg flex items-center gap-3">
             <div class="w-6 h-6 bg-[#FF5F5F] rounded-full flex items-center justify-center text-white text-[10px] font-bold">A</div>
             <span class="text-sm font-bold text-gray-800">ArtRef</span>
        </div>
    </div>

    <!-- Settings Drawer (Шторка) -->
    <aside id="drawer" class="settings-drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg id="drawer-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </div>

        <div class="p-6 h-full overflow-y-auto space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">Инструменты</h2>
                <button onclick="resetApp()" class="text-gray-400 hover:text-red-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
            </div>

            <!-- Uploads -->
            <div class="space-y-3">
                <label class="text-xs font-bold text-gray-400 uppercase">Загрузка</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 px-2 border-2 border-dashed border-gray-200 rounded-xl text-[11px] font-bold text-gray-600 hover:border-red-200">1. РЕФЕРЕНС</button>
                    <button onclick="document.getElementById('user-input').click()" class="py-3 px-2 border-2 border-dashed border-gray-200 rounded-xl text-[11px] font-bold text-gray-600 hover:border-red-200">2. РИСУНОК</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="handleImage(this, 'ref-image')">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="handleImage(this, 'user-image')">
            </div>

            <!-- Transparency -->
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-400 uppercase">Прозрачность рисунка</span>
                    <span id="opacity-val" class="text-sm font-bold text-red-500">50%</span>
                </div>
                <input type="range" id="opacity-slider" min="0" max="100" value="50" class="w-full h-2 bg-gray-100 rounded-lg appearance-none" oninput="updateOpacity()">
                <p class="text-[10px] text-gray-400 italic">Уменьшите прозрачность, чтобы видеть референс сквозь ваш рисунок.</p>
            </div>

            <!-- Transformation -->
            <div id="transform-panel" class="hidden space-y-5 bg-gray-50 p-4 rounded-2xl">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-400 uppercase">Трансформация</span>
                    <button onclick="fitToRef()" class="text-[10px] bg-red-500 text-white px-3 py-1 rounded-full font-bold">ПРИВЯЗАТЬ</button>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between text-xs font-medium">
                        <span>Масштаб</span>
                        <span id="scale-val">100%</span>
                    </div>
                    <input type="range" id="scale-slider" min="10" max="400" value="100" class="w-full" oninput="updateTransform()">
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between text-xs font-medium">
                        <span>Вращение</span>
                        <span id="rotate-val">0°</span>
                    </div>
                    <input type="range" id="rotate-slider" min="-180" max="180" value="0" class="w-full" oninput="updateTransform()">
                </div>
            </div>

            <!-- Grid -->
            <div class="bg-gray-900 text-white p-5 rounded-3xl space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold uppercase opacity-60">Сетка</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="grid-toggle" class="sr-only peer" onchange="toggleGrid()">
                        <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-red-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                    </label>
                </div>
                <div class="space-y-3">
                    <input type="range" id="grid-size" min="2" max="30" value="5" class="w-full" oninput="updateGrid()">
                </div>
            </div>

            <div class="pt-4 opacity-40 text-[10px] text-center">
                Используйте два пальца для вращения и масштабирования рисунка
            </div>
        </div>
    </aside>
</div>

<script>
    let currentX = 0;
    let currentY = 0;
    let rotation = 0;
    let scale = 1;
    let isDragging = false;
    let startX, startY;
    
    let initialDistance = null;
    let initialAngle = null;

    const userImg = document.getElementById('user-image');
    const userImgContainer = document.getElementById('user-image-container');
    const refImg = document.getElementById('ref-image');
    const drawer = document.getElementById('drawer');

    function toggleDrawer() {
        const isOpen = drawer.classList.toggle('open');
        document.getElementById('drawer-icon').style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function handleImage(input, targetId) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(targetId);
                img.src = e.target.result;
                
                if (targetId === 'user-image') {
                    userImgContainer.classList.remove('hidden');
                    document.getElementById('transform-panel').classList.remove('hidden');
                    // При загрузке рисунка сбрасываем его в 50% прозрачности сразу
                    document.getElementById('opacity-slider').value = 50;
                    updateOpacity();
                    resetTransform();
                } else {
                    img.classList.remove('hidden');
                    document.getElementById('placeholder-text').classList.add('hidden');
                    setTimeout(updateGrid, 100);
                }
            }
            reader.readAsDataURL(file);
        }
    }

    function resetTransform() {
        currentX = 0;
        currentY = 0;
        scale = 1;
        rotation = 0;
        document.getElementById('scale-slider').value = 100;
        document.getElementById('rotate-slider').value = 0;
        updateTransform();
    }

    function updateTransform() {
        const sliderScale = document.getElementById('scale-slider').value;
        const sliderRotate = document.getElementById('rotate-slider').value;
        
        scale = sliderScale / 100;
        rotation = sliderRotate;
        
        document.getElementById('scale-val').innerText = sliderScale + '%';
        document.getElementById('rotate-val').innerText = sliderRotate + '°';
        
        userImg.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale}) rotate(${rotation}deg)`;
    }

    function fitToRef() {
        if (!refImg.src) return;
        currentX = 0;
        currentY = 0;
        scale = 1;
        rotation = 0;
        userImg.style.width = "100%";
        userImg.style.height = "100%";
        userImg.style.objectFit = "contain";
        document.getElementById('scale-slider').value = 100;
        document.getElementById('rotate-slider').value = 0;
        updateTransform();
    }

    userImgContainer.addEventListener('mousedown', dragStart);
    userImgContainer.addEventListener('touchstart', touchStart, {passive: false});

    window.addEventListener('mousemove', dragMove);
    window.addEventListener('touchmove', touchMove, {passive: false});

    window.addEventListener('mouseup', dragEnd);
    window.addEventListener('touchend', dragEnd);

    function dragStart(e) {
        if (e.target.id !== 'user-image' && e.target.id !== 'user-image-container') return;
        isDragging = true;
        startX = e.clientX - currentX;
        startY = e.clientY - currentY;
    }

    function touchStart(e) {
        // Проверяем, что касание именно по области рисунка
        if (e.target.id !== 'user-image' && e.target.id !== 'user-image-container') return;
        
        if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - currentX;
            startY = e.touches[0].clientY - currentY;
        } else if (e.touches.length === 2) {
            isDragging = false; 
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            initialDistance = Math.hypot(dx, dy);
            initialAngle = Math.atan2(dy, dx) * 180 / Math.PI;
        }
    }

    function dragMove(e) {
        if (!isDragging) return;
        currentX = e.clientX - startX;
        currentY = e.clientY - startY;
        updateTransform();
    }

    function touchMove(e) {
        if (e.target.closest('#drawer')) return; // Не мешаем шторке
        
        if (e.touches.length === 1 && isDragging) {
            e.preventDefault();
            currentX = e.touches[0].clientX - startX;
            currentY = e.touches[0].clientY - startY;
            updateTransform();
        } else if (e.touches.length === 2) {
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            
            const distance = Math.hypot(dx, dy);
            if (initialDistance) {
                const scaleFactor = distance / initialDistance;
                const newScale = Math.min(Math.max(10, (scale * scaleFactor) * 100), 400);
                document.getElementById('scale-slider').value = newScale;
                initialDistance = distance;
            }
            
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            if (initialAngle !== null) {
                const angleDiff = angle - initialAngle;
                rotation = (parseFloat(rotation) + angleDiff) % 360;
                document.getElementById('rotate-slider').value = Math.round(rotation);
                initialAngle = angle;
            }

            updateTransform();
        }
    }

    function dragEnd() {
        isDragging = false;
        initialDistance = null;
        initialAngle = null;
    }

    function updateOpacity() {
        const val = document.getElementById('opacity-slider').value;
        userImg.style.opacity = val / 100;
        document.getElementById('opacity-val').innerText = val + '%';
    }

    function toggleGrid() {
        const isVisible = document.getElementById('grid-toggle').checked;
        const grid = document.getElementById('grid-overlay');
        if (isVisible) {
            grid.classList.remove('hidden');
            updateGrid();
        } else {
            grid.classList.add('hidden');
        }
    }

    function updateGrid() {
        const size = document.getElementById('grid-size').value;
        const svg = document.getElementById('grid-overlay');
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
        svg.innerHTML = '';

        const stepX = width / size;
        for (let i = 1; i < size; i++) {
            const x = i * stepX;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x); line.setAttribute("y1", 0);
            line.setAttribute("x2", x); line.setAttribute("y2", height);
            line.setAttribute("class", "grid-line");
            svg.appendChild(line);
        }

        let y = stepX;
        while (y < height) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", 0); line.setAttribute("y1", y);
            line.setAttribute("x2", width); line.setAttribute("y2", y);
            line.setAttribute("class", "grid-line");
            svg.appendChild(line);
            y += stepX;
        }
    }

    function resetApp() {
        if(confirm('Очистить все и начать заново?')) {
            location.reload();
        }
    }

    window.addEventListener('resize', updateGrid);
</script>

</body>
</html>
