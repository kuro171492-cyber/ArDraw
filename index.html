<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Wall Projector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            background-color: transparent; /* Делаем фон прозрачным */
        }
        #overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
        }
        .controls {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 12px;
            color: white;
            display: none;
        }
        #ar-button {
            padding: 15px 30px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input[type=range] { width: 200px; }
        .info-msg {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 11;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="info" class="info-msg">Нажмите кнопку для запуска AR</div>
        <div id="controls" class="controls">
            <label>Размер: </label>
            <input type="range" id="scale-range" min="0.1" max="5" step="0.1" value="1">
            <button id="reset-btn" style="margin-left: 10px;">Сброс</button>
        </div>
        <button id="ar-button">Запустить AR</button>
    </div>

    <script type="module">
        let camera, scene, renderer;
        let reticle; 
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let projectedImage = null;

        const arButton = document.getElementById('ar-button');
        const controls = document.getElementById('controls');
        const info = document.getElementById('info');
        const scaleRange = document.getElementById('scale-range');
        const resetBtn = document.getElementById('reset-btn');

        arButton.addEventListener('click', () => {
            init();
        });

        async function init() {
            if (navigator.xr) {
                try {
                    const sessionInit = { requiredFeatures: ['hit-test'] };
                    const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                    
                    setupRenderer(session);
                    
                    arButton.style.display = 'none';
                    controls.style.display = 'block';
                    info.innerText = "Наведите камеру на стену и дождитесь появления круга";
                } catch (e) {
                    alert("Ошибка запуска AR: " + e.message + "\nУбедитесь, что используете HTTPS.");
                }
            } else {
                alert("WebXR не поддерживается вашим браузером. На Android используйте Chrome, на iOS - WebXR Viewer.");
            }
        }

        function setupRenderer(session) {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true, 
                preserveDrawingBuffer: true 
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            renderer.xr.setSession(session);

            // Создаем маркер-ретикул
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 }) // Сделаем зеленым для заметности
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            session.addEventListener('select', onSelect);
            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            if (reticle.visible) {
                if (!projectedImage) {
                    const textureLoader = new THREE.TextureLoader();
                    // Тестовая картинка
                    const texture = textureLoader.load('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=500&auto=format&fit=crop&q=60');
                    
                    const geometry = new THREE.PlaneGeometry(1, 1);
                    const material = new THREE.MeshBasicMaterial({ 
                        map: texture, 
                        transparent: true, 
                        opacity: 0.6,
                        side: THREE.DoubleSide 
                    });
                    
                    projectedImage = new THREE.Mesh(geometry, material);
                    scene.add(projectedImage);
                }

                reticle.matrix.decompose(projectedImage.position, projectedImage.quaternion, projectedImage.scale);
                // Поворот плоскости под вертикаль стены
                projectedImage.rotateX(Math.PI / 2);
                
                info.innerText = "Закреплено! Можно рисовать.";
            }
        }

        scaleRange.addEventListener('input', (e) => {
            if (projectedImage) {
                const s = parseFloat(e.target.value);
                projectedImage.scale.set(s, s, s);
            }
        });

        resetBtn.addEventListener('click', () => {
            if (projectedImage) {
                scene.remove(projectedImage);
                projectedImage = null;
                info.innerText = "Ищите стену...";
            }
        });

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((referenceSpace) => {
                        session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
