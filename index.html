<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Overlay & Grid Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        video, #overlay-img {
            position: absolute;
            user-select: none;
            pointer-events: none;
        }
        #grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            color: white;
        }
        .gesture-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            touch-action: none;
        }
    </style>
</head>
<body class="bg-gray-900">

<div id="canvas-container">
    <!-- Камера -->
    <video id="camera-stream" autoplay playsinline class="w-full h-full object-cover"></video>
    
    <!-- Загруженное изображение -->
    <img id="overlay-img" src="" alt="" style="display: none; transform-origin: center;">

    <!-- Сетка -->
    <canvas id="grid-overlay"></canvas>

    <!-- Область для жестов -->
    <div class="gesture-area" id="gesture-zone"></div>
</div>

<div class="controls shadow-2xl flex flex-col gap-4">
    <div class="flex justify-between items-center gap-2">
        <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full cursor-pointer text-sm transition flex-1 text-center">
            Открыть фото
            <input type="file" id="file-input" accept="image/*" class="hidden">
        </label>
        
        <button id="toggle-camera" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full text-sm transition flex-1">
            Камера: Вкл/Выкл
        </button>

        <button id="toggle-grid" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-full text-sm transition flex-1 text-center">
            Сетка
        </button>
    </div>

    <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-300">Прозрачность изображения</label>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
    </div>

    <div class="text-[10px] text-gray-400 text-center">
        Управление: 1 палец — перемещение, 2 пальца — масштаб и поворот
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const overlayImg = document.getElementById('overlay-img');
    const video = document.getElementById('camera-stream');
    const toggleCameraBtn = document.getElementById('toggle-camera');
    const toggleGridBtn = document.getElementById('toggle-grid');
    const gridCanvas = document.getElementById('grid-overlay');
    const opacitySlider = document.getElementById('opacity-slider');
    const gestureZone = document.getElementById('gesture-zone');

    let stream = null;
    let gridVisible = false;

    // Состояние трансформации
    let state = {
        x: 0,
        y: 0,
        scale: 1,
        rotation: 0,
        lastX: 0,
        lastY: 0,
        lastDist: 0,
        lastAngle: 0
    };

    // --- Камера ---
    async function initCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            stream = null;
            return;
        }
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            console.error("Ошибка доступа к камере:", err);
            alert("Не удалось включить камеру. Проверьте разрешения.");
        }
    }

    toggleCameraBtn.onclick = initCamera;

    // --- Загрузка фото ---
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                overlayImg.src = event.target.result;
                overlayImg.style.display = 'block';
                overlayImg.style.pointerEvents = 'none';
                // Сброс позиции
                state.x = 0; state.y = 0; state.scale = 0.5; state.rotation = 0;
                applyTransform();
            };
            reader.readAsDataURL(file);
        }
    };

    // --- Сетка ---
    function drawGrid() {
        const ctx = gridCanvas.getContext('2d');
        gridCanvas.width = window.innerWidth;
        gridCanvas.height = window.innerHeight;
        
        ctx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 1;

        const step = 50; 
        for (let x = 0; x <= gridCanvas.width; x += step) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, gridCanvas.height); ctx.stroke();
        }
        for (let y = 0; y <= gridCanvas.height; y += step) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(gridCanvas.width, y); ctx.stroke();
        }
    }

    toggleGridBtn.onclick = () => {
        gridVisible = !gridVisible;
        gridCanvas.style.display = gridVisible ? 'block' : 'none';
        if (gridVisible) drawGrid();
    };

    window.onresize = () => { if (gridVisible) drawGrid(); };

    // --- Прозрачность ---
    opacitySlider.oninput = (e) => {
        overlayImg.style.opacity = e.target.value;
    };

    // --- Жесты (Touch Events) ---
    function applyTransform() {
        overlayImg.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale}) rotate(${state.rotation}deg)`;
    }

    let activeTouches = [];

    gestureZone.addEventListener('touchstart', (e) => {
        activeTouches = Array.from(e.touches);
        if (activeTouches.length === 1) {
            state.lastX = activeTouches[0].clientX;
            state.lastY = activeTouches[0].clientY;
        } else if (activeTouches.length === 2) {
            state.lastDist = Math.hypot(
                activeTouches[0].clientX - activeTouches[1].clientX,
                activeTouches[0].clientY - activeTouches[1].clientY
            );
            state.lastAngle = Math.atan2(
                activeTouches[1].clientY - activeTouches[0].clientY,
                activeTouches[1].clientX - activeTouches[0].clientX
            ) * 180 / Math.PI;
        }
    });

    gestureZone.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touches = Array.from(e.touches);

        if (touches.length === 1) {
            // Перемещение
            const dx = touches[0].clientX - state.lastX;
            const dy = touches[0].clientY - state.lastY;
            state.x += dx;
            state.y += dy;
            state.lastX = touches[0].clientX;
            state.lastY = touches[0].clientY;
        } else if (touches.length === 2) {
            // Масштаб
            const dist = Math.hypot(
                touches[0].clientX - touches[1].clientX,
                touches[0].clientY - touches[1].clientY
            );
            const scaleFactor = dist / state.lastDist;
            state.scale *= scaleFactor;
            state.lastDist = dist;

            // Поворот
            const angle = Math.atan2(
                touches[1].clientY - touches[0].clientY,
                touches[1].clientX - touches[0].clientX
            ) * 180 / Math.PI;
            const da = angle - state.lastAngle;
            state.rotation += da;
            state.lastAngle = angle;
        }
        applyTransform();
    }, { passive: false });

    // Поддержка колесика мыши для масштаба на ПК
    gestureZone.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        state.scale *= delta;
        applyTransform();
    }, { passive: false });

</script>
</body>
</html>
