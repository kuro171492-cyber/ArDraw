<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Конструктор</title>
  
  <!-- Библиотеки -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Глобальные сбросы для предотвращения смещения камеры */
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }

    /* Принудительная фиксация видеопотока AR.js */
    video#arjs-video {
      object-fit: cover !important;
      width: 100vw !important;
      height: 100vh !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      z-index: -2 !important;
    }

    /* Холст A-Frame */
    .a-canvas {
      z-index: -1 !important;
    }

    /* Кастомный ползунок */
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: #3b82f6;
      margin-top: -7px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, memo } = React;

    // Компоненты-иконки
    const StatusIndicator = ({ active }) => (
      <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full backdrop-blur-md border transition-all ${active ? 'bg-green-500/20 border-green-500 text-green-400' : 'bg-red-500/20 border-red-500 text-red-400'}`}>
        <div className={`w-2 h-2 rounded-full animate-pulse ${active ? 'bg-green-400' : 'bg-red-400'}`} />
        <span className="text-[10px] font-bold uppercase tracking-widest">
          {active ? 'Маркер найден' : 'Поиск маркера'}
        </span>
      </div>
    );

    function App() {
      const [image, setImage] = useState(null);
      const [isCameraReady, setIsCameraReady] = useState(false);
      const [isMarkerFound, setIsMarkerFound] = useState(false);
      const [opacity, setOpacity] = useState(0.7);
      const [scale, setScale] = useState(1.0);
      const [isAdjusting, setIsAdjusting] = useState(true);
      const fileInputRef = useRef(null);

      // Инициализация AR.js один раз
      useEffect(() => {
        const initAR = async () => {
          const loadScript = (src) => new Promise((res) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = res;
            document.head.appendChild(s);
          });

          await loadScript('https://aframe.io/releases/1.4.0/aframe.min.js');
          await loadScript('https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js');
          
          setIsCameraReady(true);
        };
        initAR();
      }, []);

      // Обработка событий маркера
      useEffect(() => {
        const handleMarkerFound = () => setIsMarkerFound(true);
        const handleMarkerLost = () => setIsMarkerFound(false);

        window.addEventListener('markerFound', handleMarkerFound);
        window.addEventListener('markerLost', handleMarkerLost);
        return () => {
          window.removeEventListener('markerFound', handleMarkerFound);
          window.removeEventListener('markerLost', handleMarkerLost);
        };
      }, [isCameraReady]);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => setImage(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      if (!isCameraReady) {
        return (
          <div className="flex flex-col items-center justify-center h-full text-white gap-4">
            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin" />
            <p className="text-sm font-medium animate-pulse">Запуск модуля AR...</p>
          </div>
        );
      }

      return (
        <div className="relative w-full h-full">
          {/* Сцена AR (Всегда работает в фоне) */}
          <a-scene
            embedded
            arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; displayHeight: 100vh; displayWidth: 100vw;"
            vr-mode-ui="enabled: false"
            renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
          >
            <a-assets>
              {image && <img id="userTex" src={image} crossOrigin="anonymous" />}
            </a-assets>

            <a-marker preset="hiro" id="mainMarker">
              {image && !isAdjusting && (
                <a-image
                  src="#userTex"
                  position="0 0.1 0"
                  rotation="-90 0 0"
                  width={scale * 2}
                  height={scale * 2}
                  opacity={opacity}
                  transparent="true"
                />
              )}
              <a-plane position="0 0.01 0" rotation="-90 0 0" width="2" height="2" color="#3b82f6" opacity="0.1" />
            </a-marker>
            <a-entity camera />
          </a-scene>

          {/* Слой интерфейса */}
          <div className="absolute inset-0 flex flex-col pointer-events-none p-6">
            
            {/* Верхняя панель */}
            <div className="flex justify-between items-start w-full pointer-events-auto">
              <StatusIndicator active={isMarkerFound} />
              <button 
                onClick={() => window.location.reload()}
                className="p-2 bg-black/40 backdrop-blur-md rounded-full border border-white/20 text-white"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>

            {/* Центральная зона - Превью при настройке */}
            <div className="flex-1 flex items-center justify-center">
              {isAdjusting && image && (
                <div className="relative w-64 h-64 border-2 border-dashed border-blue-400/50 flex items-center justify-center">
                  <img 
                    src={image} 
                    className="max-w-full max-h-full object-contain transition-all"
                    style={{ opacity, transform: `scale(${scale})` }}
                  />
                  <div className="absolute -top-8 text-[10px] text-blue-400 font-bold uppercase tracking-widest">Область наложения</div>
                </div>
              )}
              {!image && isAdjusting && (
                <div className="p-8 bg-black/40 backdrop-blur-xl border border-white/10 rounded-3xl text-center pointer-events-auto max-w-xs">
                  <h2 className="text-xl font-bold mb-2">Начнем работу</h2>
                  <p className="text-sm text-white/60 mb-6">Загрузите фото, которое хотите увидеть на листе бумаги.</p>
                  <button 
                    onClick={() => fileInputRef.current.click()}
                    className="w-full py-4 bg-blue-600 rounded-2xl font-bold shadow-xl shadow-blue-500/20 active:scale-95 transition-all"
                  >
                    Выбрать изображение
                  </button>
                </div>
              )}
            </div>

            {/* Нижняя панель управления */}
            {image && (
              <div className="w-full bg-black/60 backdrop-blur-2xl border border-white/10 rounded-3xl p-6 pointer-events-auto space-y-5 shadow-2xl">
                {isAdjusting ? (
                  <>
                    <div className="space-y-4">
                      <div className="space-y-1">
                        <div className="flex justify-between text-[10px] text-white/40 uppercase font-bold">
                          <span>Прозрачность</span>
                          <span className="text-blue-400">{Math.round(opacity * 100)}%</span>
                        </div>
                        <input 
                          type="range" min="0.1" max="1" step="0.01" value={opacity} 
                          onChange={(e) => setOpacity(parseFloat(e.target.value))}
                          className="w-full"
                        />
                      </div>
                      <div className="space-y-1">
                        <div className="flex justify-between text-[10px] text-white/40 uppercase font-bold">
                          <span>Размер</span>
                          <span className="text-blue-400">x{scale}</span>
                        </div>
                        <input 
                          type="range" min="0.5" max="3" step="0.05" value={scale} 
                          onChange={(e) => setScale(parseFloat(e.target.value))}
                          className="w-full"
                        />
                      </div>
                    </div>
                    <div className="flex gap-3">
                      <button 
                        onClick={() => setImage(null)}
                        className="p-4 bg-white/5 rounded-2xl border border-white/10"
                      >
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                      </button>
                      <button 
                        onClick={() => setIsAdjusting(false)}
                        className="flex-1 py-4 bg-blue-600 rounded-2xl font-bold active:scale-95 transition-all"
                      >
                        Привязать к листу
                      </button>
                    </div>
                  </>
                ) : (
                  <div className="text-center space-y-4">
                    <p className="text-sm font-medium">✨ Изображение зафиксировано на маркере</p>
                    <button 
                      onClick={() => setIsAdjusting(true)}
                      className="w-full py-4 bg-white/10 rounded-2xl font-bold border border-white/10 hover:bg-white/20 transition-all"
                    >
                      Вернуться к настройкам
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          <input 
            type="file" 
            ref={fileInputRef} 
            onChange={handleFileUpload} 
            accept="image/*" 
            className="hidden" 
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
