<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Stencil Pro</title>
    <!-- Подключение стабильных версий библиотек -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        .ui-overlay { z-index: 1000; position: absolute; }
        
        /* Стили для видео-потока */
        .mindar-ui-overlay { z-index: 500 !important; }
        video { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
        }

        /* Экран приветствия и загрузки */
        #setup-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: white;
        }

        #target-preview {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 24px;
            z-index: 2000; text-align: center; color: black;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 90%;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px; width: 24px;
            border-radius: 50%; background: #ffffff;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Шаг 1: Экран настройки -->
    <div id="setup-screen" class="transition-opacity duration-500">
        <div class="mb-8 p-6 bg-white/5 rounded-3xl border border-white/10">
            <svg class="w-16 h-16 mx-auto mb-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <h1 class="text-2xl font-bold mb-2">AR Трафарет</h1>
            <p class="text-gray-400 text-sm">Выберите изображение, которое хотите перенести на бумагу</p>
        </div>
        
        <label class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold transition-all cursor-pointer active:scale-95 shadow-xl shadow-blue-900/20">
            Выбрать картинку
            <input type="file" id="imageLoader" accept="image/*" class="hidden">
        </label>
        
        <div id="selected-preview" class="mt-8 hidden">
            <p class="text-xs uppercase tracking-widest text-gray-500 mb-2">Выбрано:</p>
            <img id="img-thumb" src="" class="w-24 h-24 object-cover rounded-xl border-2 border-blue-500/50">
            <button id="start-ar-btn" class="mt-6 bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-2xl font-bold transition-all block mx-auto">
                Запустить AR
            </button>
        </div>
    </div>

    <!-- Интерфейс AR (скрыт изначально) -->
    <div id="ar-ui" class="ui-overlay inset-0 pointer-events-none flex flex-col justify-between p-6 opacity-0 transition-opacity duration-500">
        <div class="flex justify-between items-start pointer-events-auto">
            <div id="statusTag" class="bg-black/60 backdrop-blur-xl border border-white/20 px-4 py-2 rounded-full flex items-center gap-2">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></div>
                <span id="statusText" class="text-xs font-bold uppercase tracking-widest text-white">Поиск маркера...</span>
            </div>
            
            <button id="helpBtn" class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-full border border-white/20 flex items-center justify-center text-white">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </button>
        </div>

        <div class="bg-black/60 backdrop-blur-2xl border border-white/10 p-6 rounded-[2.5rem] pointer-events-auto flex flex-col gap-5 shadow-2xl text-white">
            <div class="flex items-center justify-between gap-4">
                <div class="flex-1 flex flex-col gap-2">
                    <div class="flex justify-between text-[10px] text-white/50 uppercase font-black tracking-tighter">
                        <span>Прозрачность рисунка</span>
                        <span id="opacityLabel">50%</span>
                    </div>
                    <input type="range" id="opacityRange" min="0" max="1" step="0.01" value="0.5" class="w-full h-1.5 bg-white/20 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="flex gap-2 bg-white/5 rounded-2xl p-1 border border-white/5">
                   <button id="minusBtn" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-xl transition-colors"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                   <button id="plusBtn" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-xl transition-colors"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Инструкция -->
    <div id="target-preview">
        <h3 class="font-bold text-lg mb-2">Наведите на маркер</h3>
        <p class="text-sm text-gray-500 mb-6">Используйте это изображение как "якорь" на столе рядом с листом бумаги.</p>
        <img src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" class="w-56 mx-auto mb-6 rounded-2xl shadow-xl">
        <button id="closeHelpBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/30">Начать рисовать</button>
    </div>

    <!-- AR Сцена (без autoStart) -->
    <a-scene 
        id="main-scene"
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiScanning: no;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <a-image id="ar-image" position="0 0 0" height="1" width="1" opacity="0.5" transparent="true"></a-image>
        </a-entity>
    </a-scene>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const arImage = document.getElementById('ar-image');
        const imgThumb = document.getElementById('img-thumb');
        const setupScreen = document.getElementById('setup-screen');
        const startArBtn = document.getElementById('start-ar-btn');
        const selectedPreview = document.getElementById('selected-preview');
        const arUi = document.getElementById('ar-ui');
        const sceneEl = document.querySelector('a-scene');
        
        const opacityRange = document.getElementById('opacityRange');
        const opacityLabel = document.getElementById('opacityLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const targetEntity = document.getElementById('ar-target');
        const preview = document.getElementById('target-preview');

        let currentScale = 1;

        // 1. Выбор изображения
        imageLoader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                imgThumb.src = url;
                selectedPreview.classList.remove('hidden');
                
                // Подготовка AR изображения
                arImage.setAttribute('src', url);
                const img = new Image();
                img.onload = () => {
                    const ratio = img.width / img.height;
                    arImage.setAttribute('width', ratio);
                    arImage.setAttribute('height', 1);
                };
                img.src = url;
            }
        });

        // 2. Запуск AR
        startArBtn.addEventListener('click', () => {
            setupScreen.classList.add('opacity-0');
            setTimeout(() => {
                setupScreen.style.display = 'none';
                preview.style.display = 'block';
                
                // Инициализация MindAR вручную
                const arSystem = sceneEl.systems["mindar-image-system"];
                arSystem.start(); 
                
                arUi.classList.remove('opacity-0');
            }, 500);
        });

        document.getElementById('closeHelpBtn').onclick = () => {
            preview.style.display = 'none';
        };

        document.getElementById('helpBtn').onclick = () => {
            preview.style.display = 'block';
        };

        // Управление в процессе
        opacityRange.addEventListener('input', (e) => {
            const val = e.target.value;
            arImage.setAttribute('opacity', val);
            opacityLabel.innerText = Math.round(val * 100) + '%';
        });

        document.getElementById('plusBtn').onclick = () => {
            currentScale *= 1.1;
            arImage.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        };
        document.getElementById('minusBtn').onclick = () => {
            currentScale *= 0.9;
            arImage.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        };

        // Статусы
        targetEntity.addEventListener("targetFound", () => {
            statusDot.classList.replace('bg-amber-500', 'bg-green-500');
            statusDot.classList.remove('animate-pulse');
            statusText.innerText = "Закреплено";
        });

        targetEntity.addEventListener("targetLost", () => {
            statusDot.classList.replace('bg-green-500', 'bg-amber-500');
            statusDot.classList.add('animate-pulse');
            statusText.innerText = "Поиск маркера...";
        });
    </script>
</body>
</html>
