<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Overlay & Grid Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем A-Frame и AR.js для функционала дополненной реальности -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        /* Стили для элементов интерфейса поверх AR-сцены */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .ui-layer * {
            pointer-events: auto;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        /* Инструкция для пользователя */
        .ar-hint {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            text-align: center;
            z-index: 1001;
        }
    </style>
</head>
<body>

    <!-- Подсказка для AR режима -->
    <div class="ar-hint" id="ar-hint">
        Направьте камеру на маркер "Hiro" или белый лист
    </div>

    <!-- Холст для сетки -->
    <canvas id="grid-overlay"></canvas>

    <!-- AR Сцена -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" vr-mode-ui="enabled: false">
        
        <!-- Ассеты -->
        <a-assets>
            <!-- Плейсхолдер для загруженного изображения -->
            <img id="dynamic-texture" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        </a-assets>

        <!-- Маркер (используем стандартный маркер Hiro) -->
        <!-- Вы можете распечатать маркер Hiro или использовать его изображение на другом экране -->
        <a-marker preset="hiro" id="marker">
            <!-- Плоскость, на которую накладывается изображение -->
            <a-plane 
                id="ar-plane"
                position="0 0 0" 
                rotation="-90 0 0" 
                width="1" 
                height="1" 
                material="src: #dynamic-texture; transparent: true; opacity: 0.5; side: double">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- UI Интерфейс -->
    <div class="ui-layer">
        <div class="controls flex flex-col gap-4">
            <div class="flex justify-between items-center gap-2">
                <label class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full cursor-pointer text-sm transition flex-1 text-center font-medium">
                    Выбрать фото
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                </label>
                
                <button id="toggle-grid" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-full text-sm transition flex-1 text-center">
                    Сетка
                </button>

                <button id="reset-transform" class="bg-red-900/50 hover:bg-red-800 text-white px-4 py-2 rounded-full text-sm transition flex-1 text-center">
                    Сброс
                </button>
            </div>

            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-gray-300">Прозрачность</label>
                    <span id="opacity-val" class="text-xs text-blue-400">0.5</span>
                </div>
                <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="flex flex-col gap-1">
                <div class="flex justify-between">
                    <label class="text-xs text-gray-300">Размер изображения в AR</label>
                </div>
                <input type="range" id="scale-slider" min="0.1" max="5" step="0.1" value="1" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="text-[10px] text-gray-400 text-center uppercase tracking-wider">
                Положите маркер Hiro на лист бумаги
            </div>
        </div>
    </div>

<script>
    const fileInput = document.getElementById('file-input');
    const arPlane = document.getElementById('ar-plane');
    const textureImg = document.getElementById('dynamic-texture');
    const opacitySlider = document.getElementById('opacity-slider');
    const opacityVal = document.getElementById('opacity-val');
    const scaleSlider = document.getElementById('scale-slider');
    const toggleGridBtn = document.getElementById('toggle-grid');
    const gridCanvas = document.getElementById('grid-overlay');
    const resetBtn = document.getElementById('reset-transform');
    const marker = document.getElementById('marker');
    const hint = document.getElementById('ar-hint');

    let gridVisible = false;

    // --- Загрузка изображения ---
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                // Обновляем src ассета
                textureImg.setAttribute('src', event.target.result);
                
                // Ждем загрузки картинки, чтобы скорректировать пропорции плоскости
                const tempImg = new Image();
                tempImg.onload = function() {
                    const aspect = this.width / this.height;
                    if (aspect > 1) {
                        arPlane.setAttribute('width', aspect);
                        arPlane.setAttribute('height', 1);
                    } else {
                        arPlane.setAttribute('width', 1);
                        arPlane.setAttribute('height', 1 / aspect);
                    }
                };
                tempImg.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    // --- Прозрачность ---
    opacitySlider.oninput = (e) => {
        const val = e.target.value;
        arPlane.setAttribute('material', `src: #dynamic-texture; transparent: true; opacity: ${val}; side: double`);
        opacityVal.innerText = val;
    };

    // --- Масштаб в AR ---
    scaleSlider.oninput = (e) => {
        const s = e.target.value;
        arPlane.setAttribute('scale', `${s} ${s} ${s}`);
    };

    // --- Сброс ---
    resetBtn.onclick = () => {
        scaleSlider.value = 1;
        opacitySlider.value = 0.5;
        opacityVal.innerText = "0.5";
        arPlane.setAttribute('scale', '1 1 1');
        arPlane.setAttribute('material', `src: #dynamic-texture; transparent: true; opacity: 0.5; side: double`);
        arPlane.setAttribute('rotation', '-90 0 0');
    };

    // --- Сетка (2D overlay) ---
    function drawGrid() {
        const ctx = gridCanvas.getContext('2d');
        gridCanvas.width = window.innerWidth;
        gridCanvas.height = window.innerHeight;
        
        ctx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 1;

        const step = 50; 
        for (let x = 0; x <= gridCanvas.width; x += step) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, gridCanvas.height); ctx.stroke();
        }
        for (let y = 0; y <= gridCanvas.height; y += step) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(gridCanvas.width, y); ctx.stroke();
        }
    }

    toggleGridBtn.onclick = () => {
        gridVisible = !gridVisible;
        gridCanvas.style.display = gridVisible ? 'block' : 'none';
        if (gridVisible) drawGrid();
    };

    // События обнаружения маркера для подсказок
    marker.addEventListener('markerFound', () => {
        hint.innerText = "Маркер найден!";
        hint.style.background = "rgba(0, 150, 0, 0.7)";
    });

    marker.addEventListener('markerLost', () => {
        hint.innerText = "Направьте камеру на маркер Hiro";
        hint.style.background = "rgba(0, 0, 0, 0.6)";
    });

    window.onresize = () => { if (gridVisible) drawGrid(); };

</script>
</body>
</html>
