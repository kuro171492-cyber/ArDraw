<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtRef - Помощник Художника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #FF5F5F;
        }
        body {
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            overflow: hidden;
            margin: 0;
            color: white;
        }
        .app-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .canvas-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .img-layer {
            position: absolute;
            max-width: none;
            max-height: none;
            transform-origin: center;
            pointer-events: none;
            display: none;
        }
        #ref-image { z-index: 2; }
        #user-image { z-index: 3; opacity: 0.5; }

        /* Шторка */
        .settings-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            color: #333;
        }
        .settings-drawer.open { transform: translateX(0); }
        .drawer-handle {
            position: absolute;
            left: -48px;
            top: 20px;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
        }

        /* Точка центра */
        #pivot-point {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            z-index: 50;
            pointer-events: auto;
            transform: translate(-50%, -50%);
            display: none;
        }
        #pivot-point::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Джойстики */
        .joystick-zone {
            position: absolute;
            bottom: 40px;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            z-index: 40;
            display: none;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #joy-move { left: 40px; }
        #joy-scale-rot { right: 40px; }

        .grid-line { stroke: rgba(255, 255, 255, 0.2); stroke-width: 1; }
        .active-btn { background-color: var(--primary) !important; color: white !important; }
    </style>
</head>
<body>

<div class="app-container" id="interaction-zone">
    <div class="canvas-area">
        <div id="placeholder" class="text-gray-500 text-center">
            <p>Загрузите изображения в меню</p>
        </div>
        <img id="ref-image" class="img-layer" alt="Ref">
        <img id="user-image" class="img-layer" alt="User">
        <svg id="grid-overlay" class="absolute inset-0 pointer-events-none z-10 hidden"></svg>
    </div>

    <!-- Pivot Point -->
    <div id="pivot-point"></div>

    <!-- Джойстики -->
    <div id="joy-move" class="joystick-zone"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></div>
    <div id="joy-scale-rot" class="joystick-zone"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></div>

    <aside id="drawer" class="settings-drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg id="drawer-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </div>

        <div class="p-6 h-full overflow-y-auto space-y-6">
            <h2 class="text-xl font-bold">Панель управления</h2>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400 uppercase">Слои</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold">1. РЕФЕРЕНС</button>
                    <button onclick="document.getElementById('user-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold">2. РИСУНОК</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="loadFile(this, 'ref-image')">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="loadFile(this, 'user-image')">
            </div>

            <div class="space-y-3">
                <label class="text-xs font-bold text-gray-400 uppercase">Режимы</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-link" onclick="toggleLink()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl hover:bg-gray-200">
                        <svg class="mb-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                        <span class="text-[9px] font-bold">СВЯЗКА</span>
                    </button>
                    <button id="btn-precision" onclick="togglePrecision()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl hover:bg-gray-200">
                        <svg class="mb-1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m12 8 4 4-4 4"/><path d="M8 12h8"/></svg>
                        <span class="text-[9px] font-bold">ТОЧНОСТЬ</span>
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-400 uppercase">Прозрачность рисунка</span>
                    <span id="opacity-val" class="text-sm font-bold text-red-500">50%</span>
                </div>
                <input type="range" id="opacity-slider" min="0" max="100" value="50" class="w-full h-2 bg-gray-100 rounded-lg" oninput="updateOpacity()">
            </div>

            <div class="bg-gray-100 p-4 rounded-2xl space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold uppercase text-gray-500">Сетка</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="grid-toggle" class="sr-only peer" onchange="toggleGrid()">
                        <div class="w-10 h-5 bg-gray-300 rounded-full peer peer-checked:bg-red-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                    </label>
                </div>
                <input type="range" id="grid-size" min="2" max="30" value="8" class="w-full" oninput="drawGrid()">
            </div>

            <button onclick="resetAll()" class="w-full py-3 text-red-500 font-bold text-xs border border-red-200 rounded-xl">СБРОСИТЬ ВСЁ</button>
        </div>
    </aside>
</div>

<script>
    // State
    let states = {
        ref: { x: 0, y: 0, s: 1, r: 0 },
        user: { x: 0, y: 0, s: 1, r: 0 }
    };
    let isLinked = false;
    let isPrecisionMode = false;
    let pivot = { x: window.innerWidth/2, y: window.innerHeight/2 };

    // Interaction vars
    let activePointers = new Map();
    let initialDist = 0;
    let initialAngle = 0;
    let lastPivotPos = {x: 0, y: 0};

    const refEl = document.getElementById('ref-image');
    const userEl = document.getElementById('user-image');
    const pivotEl = document.getElementById('pivot-point');
    const drawer = document.getElementById('drawer');

    function toggleDrawer() {
        drawer.classList.toggle('open');
    }

    function toggleLink() {
        isLinked = !isLinked;
        document.getElementById('btn-link').classList.toggle('active-btn', isLinked);
    }

    function togglePrecision() {
        isPrecisionMode = !isPrecisionMode;
        document.getElementById('btn-precision').classList.toggle('active-btn', isPrecisionMode);
        pivotEl.style.display = isPrecisionMode ? 'block' : 'none';
        document.querySelectorAll('.joystick-zone').forEach(z => z.style.display = isPrecisionMode ? 'flex' : 'none');
        
        if (isPrecisionMode) {
            pivot.x = window.innerWidth / 2;
            pivot.y = window.innerHeight / 2;
            updatePivotUI();
        }
    }

    function loadFile(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                
                // Центрируем новое изображение
                states[id === 'ref-image' ? 'ref' : 'user'] = { x: 0, y: 0, s: 1, r: 0 };
                applyTransforms();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateOpacity() {
        const val = document.getElementById('opacity-slider').value;
        userEl.style.opacity = val / 100;
        document.getElementById('opacity-val').innerText = val + '%';
    }

    function applyTransforms() {
        refEl.style.transform = `translate(${states.ref.x}px, ${states.ref.y}px) scale(${states.ref.s}) rotate(${states.ref.r}deg)`;
        userEl.style.transform = `translate(${states.user.x}px, ${states.user.y}px) scale(${states.user.s}) rotate(${states.user.r}deg)`;
        
        // В режиме точности устанавливаем transform-origin в точку pivot
        // Но так как pivot меняется, проще рассчитывать смещение математически
        // Для этого примера используем стандартный origin и смещаем x/y
        const originStr = isPrecisionMode ? `${pivot.x}px ${pivot.y}px` : 'center';
        refEl.style.transformOrigin = originStr;
        userEl.style.transformOrigin = originStr;
    }

    function updatePivotUI() {
        pivotEl.style.left = pivot.x + 'px';
        pivotEl.style.top = pivot.y + 'px';
    }

    // Обработка жестов
    const zone = document.getElementById('interaction-zone');

    zone.addEventListener('pointerdown', e => {
        if (e.target.closest('#drawer')) return;
        activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        
        if (activePointers.size === 2) {
            const pts = Array.from(activePointers.values());
            initialDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            initialAngle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
        }

        if (e.target === pivotEl) {
            e.target.setPointerCapture(e.pointerId);
        }
    });

    zone.addEventListener('pointermove', e => {
        if (activePointers.size === 0) return;
        
        // Перемещение точки центра
        if (e.target === pivotEl && isPrecisionMode) {
            pivot.x = e.clientX;
            pivot.y = e.clientY;
            updatePivotUI();
            applyTransforms();
            return;
        }

        if (activePointers.size === 1) {
            const prev = activePointers.get(e.pointerId);
            const dx = e.clientX - prev.x;
            const dy = e.clientY - prev.y;
            
            updateState('x', dx, 'y', dy);
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        } else if (activePointers.size === 2) {
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            const pts = Array.from(activePointers.values());
            
            const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            const angle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
            
            if (initialDist > 0) {
                const sFactor = dist / initialDist;
                updateState('s', sFactor);
                initialDist = dist;
            }
            
            const aFactor = angle - initialAngle;
            updateState('r', aFactor);
            initialAngle = angle;
        }
        applyTransforms();
    });

    zone.addEventListener('pointerup', e => {
        activePointers.delete(e.pointerId);
        if (activePointers.size < 2) {
            initialDist = 0;
            initialAngle = 0;
        }
    });

    function updateState(key, val, key2, val2) {
        const targets = isLinked ? ['ref', 'user'] : ['user'];
        targets.forEach(t => {
            if (key === 's') states[t].s *= val;
            else if (key === 'r') states[t].r += val;
            else if (key === 'x') {
                states[t].x += val;
                states[t].y += val2;
            }
        });
    }

    // Джойстики
    let joyInterval = null;
    function startJoy(type, action) {
        clearInterval(joyInterval);
        joyInterval = setInterval(() => {
            if (type === 'move') updateState('x', action.x, 'y', action.y);
            if (type === 'scale') updateState('s', action.s);
            if (type === 'rot') updateState('r', action.r);
            applyTransforms();
        }, 16);
    }

    document.getElementById('joy-move').addEventListener('pointerdown', e => {
        const rect = e.currentTarget.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const moveHandler = (me) => {
            const dx = (me.clientX - cx) / 10;
            const dy = (me.clientY - cy) / 10;
            startJoy('move', {x: dx, y: dy});
        };
        window.addEventListener('pointermove', moveHandler);
        window.addEventListener('pointerup', () => {
            clearInterval(joyInterval);
            window.removeEventListener('pointermove', moveHandler);
        }, {once: true});
    });

    document.getElementById('joy-scale-rot').addEventListener('pointerdown', e => {
        const rect = e.currentTarget.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const srHandler = (me) => {
            const dx = (me.clientX - cx) / 50;
            const dy = (me.clientY - cy) / 20;
            startJoy('scale', {s: 1 + dy * -0.01});
            // Совмещаем масштаб и поворот
            states[isLinked ? 'ref' : 'user'].r += dx;
            if (isLinked) states.user.r += dx;
        };
        window.addEventListener('pointermove', srHandler);
        window.addEventListener('pointerup', () => {
            clearInterval(joyInterval);
            window.removeEventListener('pointermove', srHandler);
        }, {once: true});
    });

    function toggleGrid() {
        document.getElementById('grid-overlay').classList.toggle('hidden');
        drawGrid();
    }

    function drawGrid() {
        const size = document.getElementById('grid-size').value;
        const svg = document.getElementById('grid-overlay');
        const w = window.innerWidth;
        const h = window.innerHeight;
        svg.innerHTML = '';
        const step = w / size;
        for(let x=0; x<=w; x+=step) {
            svg.innerHTML += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" class="grid-line" />`;
        }
        for(let y=0; y<=h; y+=step) {
            svg.innerHTML += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" class="grid-line" />`;
        }
    }

    function resetAll() {
        if(confirm('Сбросить положение и изображения?')) location.reload();
    }

    window.addEventListener('resize', drawGrid);
</script>

</body>
</html>
