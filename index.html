<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtRef - Помощник Художника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #FF5F5F;
            --bg-dark: #111;
            --panel-bg: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            overflow: hidden;
            margin: 0;
            color: white;
        }
        .app-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .canvas-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .img-layer {
            position: absolute;
            max-width: none;
            max-height: none;
            pointer-events: none;
            display: none;
            /* Важно: transform-origin будет меняться динамически через JS */
            transform-origin: center; 
        }
        #ref-image { z-index: 2; }
        #user-image { z-index: 3; opacity: 0.5; }

        /* Шторка меню */
        .settings-drawer {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            color: #333;
        }
        .settings-drawer.open { transform: translateX(0); }
        .drawer-handle {
            position: absolute;
            left: -48px;
            top: 20px;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
        }

        /* Точка центра */
        #pivot-point {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            z-index: 60;
            pointer-events: auto;
            transform: translate(-50%, -50%);
            display: none;
            background: rgba(255, 95, 95, 0.1);
        }
        #pivot-point::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Кнопки точного управления */
        .precision-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 20px;
            z-index: 50;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .btn-ctrl {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-ctrl:active { background: var(--primary); }
        .btn-ctrl svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2.5; }

        .grid-line { stroke: rgba(255, 255, 255, 0.15); stroke-width: 1; }
        .active-btn { background-color: var(--primary) !important; color: white !important; }
    </style>
</head>
<body>

<div class="app-container" id="interaction-zone">
    <div class="canvas-area">
        <div id="placeholder" class="text-gray-500 text-center pointer-events-none">
            <p class="text-xl font-bold mb-2">ArtRef</p>
            <p class="text-sm">Откройте меню справа для загрузки</p>
        </div>
        <img id="ref-image" class="img-layer" alt="Ref">
        <img id="user-image" class="img-layer" alt="User">
        <svg id="grid-overlay" class="absolute inset-0 pointer-events-none z-10 hidden"></svg>
    </div>

    <!-- Точка центра вращения -->
    <div id="pivot-point"></div>

    <!-- Панель точного управления -->
    <div id="precision-panel" class="precision-controls">
        <!-- Группа перемещения -->
        <div class="control-group">
            <span class="text-[9px] font-bold text-gray-400">ПОЗИЦИЯ</span>
            <div class="numpad">
                <div></div>
                <div class="btn-ctrl" onclick="nudge('y', -1)"><svg viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg></div>
                <div></div>
                <div class="btn-ctrl" onclick="nudge('x', -1)"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></div>
                <div class="btn-ctrl opacity-30"><div class="w-1 h-1 bg-white rounded-full"></div></div>
                <div class="btn-ctrl" onclick="nudge('x', 1)"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>
                <div></div>
                <div class="btn-ctrl" onclick="nudge('y', 1)"><svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></div>
                <div></div>
            </div>
        </div>

        <!-- Группа масштаба и поворота -->
        <div class="control-group">
            <span class="text-[9px] font-bold text-gray-400">МАСШТАБ / ПОВОРОТ</span>
            <div class="flex flex-col gap-2">
                <div class="flex gap-2">
                    <div class="btn-ctrl" onclick="nudge('s', 0.99)"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></div>
                    <div class="btn-ctrl" onclick="nudge('s', 1.01)"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
                </div>
                <div class="flex gap-2">
                    <div class="btn-ctrl" onclick="nudge('r', -0.5)"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></div>
                    <div class="btn-ctrl" onclick="nudge('r', 0.5)"><svg viewBox="0 0 24 24" style="transform: scaleX(-1)"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Боковая панель -->
    <aside id="drawer" class="settings-drawer">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg id="drawer-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        </div>

        <div class="p-6 h-full overflow-y-auto space-y-6">
            <h2 class="text-xl font-bold border-b pb-2">Управление</h2>

            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Слои изображения</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold">1. РЕФЕРЕНС</button>
                    <button onclick="document.getElementById('user-input').click()" class="py-3 px-2 border-2 rounded-xl text-[10px] font-bold">2. РИСУНОК</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="loadFile(this, 'ref-image')">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="loadFile(this, 'user-image')">
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Рабочие режимы</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-link" onclick="toggleLink()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors">
                        <svg class="mb-1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                        <span class="text-[9px] font-bold">СВЯЗКА</span>
                    </button>
                    <button id="btn-precision" onclick="togglePrecision()" class="flex flex-col items-center py-3 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors">
                        <svg class="mb-1" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m12 8 4 4-4 4"/><path d="M8 12h8"/></svg>
                        <span class="text-[9px] font-bold">ТОЧНОСТЬ</span>
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Прозрачность (2)</span>
                    <span id="opacity-val" class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded">50%</span>
                </div>
                <input type="range" id="opacity-slider" min="0" max="100" value="50" class="w-full accent-red-500" oninput="updateOpacity()">
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl space-y-4 border border-gray-100">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase text-gray-500">Сетка направляющих</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="grid-toggle" class="sr-only peer" onchange="toggleGrid()">
                        <div class="w-10 h-5 bg-gray-300 rounded-full peer peer-checked:bg-red-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
                    </label>
                </div>
                <input type="range" id="grid-size" min="2" max="40" value="8" class="w-full accent-gray-400" oninput="drawGrid()">
            </div>

            <button onclick="resetAll()" class="w-full py-3 text-red-500 font-bold text-[10px] border border-red-100 rounded-xl hover:bg-red-50">СБРОСИТЬ ПАРАМЕТРЫ</button>
        </div>
    </aside>
</div>

<script>
    // State management
    let states = {
        ref: { x: 0, y: 0, s: 1, r: 0 },
        user: { x: 0, y: 0, s: 1, r: 0 }
    };
    
    let isLinked = false;
    let isPrecisionMode = false;
    let pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

    let activePointers = new Map();
    let initialDist = 0;
    let initialAngle = 0;

    const refEl = document.getElementById('ref-image');
    const userEl = document.getElementById('user-image');
    const pivotEl = document.getElementById('pivot-point');
    const drawer = document.getElementById('drawer');
    const precisionPanel = document.getElementById('precision-panel');

    function toggleDrawer() {
        drawer.classList.toggle('open');
    }

    function toggleLink() {
        isLinked = !isLinked;
        document.getElementById('btn-link').classList.toggle('active-btn', isLinked);
    }

    function togglePrecision() {
        isPrecisionMode = !isPrecisionMode;
        document.getElementById('btn-precision').classList.toggle('active-btn', isPrecisionMode);
        
        pivotEl.style.display = isPrecisionMode ? 'block' : 'none';
        precisionPanel.style.display = isPrecisionMode ? 'flex' : 'none';
        
        if (isPrecisionMode) {
            updatePivotUI();
        } else {
            // Возвращаем origin в центр при выходе из режима
            refEl.style.transformOrigin = 'center';
            userEl.style.transformOrigin = 'center';
        }
        applyTransforms();
    }

    function loadFile(input, id) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(id);
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                applyTransforms();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateOpacity() {
        const val = document.getElementById('opacity-slider').value;
        userEl.style.opacity = val / 100;
        document.getElementById('opacity-val').innerText = val + '%';
    }

    function applyTransforms() {
        // Вычисляем origin относительно контейнера
        // В режиме точности мы используем pivot как центр трансформации
        const originStr = isPrecisionMode ? `${pivot.x}px ${pivot.y}px` : 'center';
        
        refEl.style.transformOrigin = originStr;
        userEl.style.transformOrigin = originStr;

        refEl.style.transform = `translate(${states.ref.x}px, ${states.ref.y}px) scale(${states.ref.s}) rotate(${states.ref.r}deg)`;
        userEl.style.transform = `translate(${states.user.x}px, ${states.user.y}px) scale(${states.user.s}) rotate(${states.user.r}deg)`;
    }

    function updatePivotUI() {
        pivotEl.style.left = pivot.x + 'px';
        pivotEl.style.top = pivot.y + 'px';
    }

    function nudge(key, amount) {
        const targets = isLinked ? ['ref', 'user'] : ['user'];
        targets.forEach(t => {
            if (key === 'x') states[t].x += amount;
            if (key === 'y') states[t].y += amount;
            if (key === 's') states[t].s *= amount;
            if (key === 'r') states[t].r += amount;
        });
        applyTransforms();
    }

    const zone = document.getElementById('interaction-zone');

    zone.addEventListener('pointerdown', e => {
        if (e.target.closest('#drawer') || e.target.closest('#precision-panel')) return;
        
        activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        
        if (activePointers.size === 2) {
            const pts = Array.from(activePointers.values());
            initialDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            initialAngle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
        }

        if (e.target === pivotEl) {
            e.target.setPointerCapture(e.pointerId);
        }
    });

    zone.addEventListener('pointermove', e => {
        if (!activePointers.has(e.pointerId)) return;
        
        // Логика перемещения точки центра (Pivot)
        if (e.target === pivotEl && isPrecisionMode) {
            pivot.x = e.clientX;
            pivot.y = e.clientY;
            updatePivotUI();
            applyTransforms();
            return;
        }

        if (activePointers.size === 1) {
            const prev = activePointers.get(e.pointerId);
            const dx = e.clientX - prev.x;
            const dy = e.clientY - prev.y;
            
            nudge('x', dx);
            // Костыль для Y, так как nudge принимает один ключ за раз в текущем виде
            const targets = isLinked ? ['ref', 'user'] : ['user'];
            targets.forEach(t => states[t].y += dy);
            
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        } else if (activePointers.size === 2) {
            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            const pts = Array.from(activePointers.values());
            
            const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
            const angle = Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) * 180 / Math.PI;
            
            if (initialDist > 0) {
                const sFactor = dist / initialDist;
                nudge('s', sFactor);
                initialDist = dist;
            }
            
            const aDiff = angle - initialAngle;
            nudge('r', aDiff);
            initialAngle = angle;
        }
        applyTransforms();
    });

    zone.addEventListener('pointerup', e => {
        activePointers.delete(e.pointerId);
    });

    function toggleGrid() {
        document.getElementById('grid-overlay').classList.toggle('hidden');
        drawGrid();
    }

    function drawGrid() {
        const size = document.getElementById('grid-size').value;
        const svg = document.getElementById('grid-overlay');
        const w = window.innerWidth;
        const h = window.innerHeight;
        svg.innerHTML = '';
        const step = w / size;
        for(let x=0; x<=w; x+=step) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x); line.setAttribute("y1", 0);
            line.setAttribute("x2", x); line.setAttribute("y2", h);
            line.setAttribute("class", "grid-line");
            svg.appendChild(line);
        }
        for(let y=0; y<=h; y+=step) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", 0); line.setAttribute("y1", y);
            line.setAttribute("x2", w); line.setAttribute("y2", y);
            line.setAttribute("class", "grid-line");
            svg.appendChild(line);
        }
    }

    function resetAll() {
        if(confirm('Сбросить все настройки трансформации?')) {
            states.ref = { x: 0, y: 0, s: 1, r: 0 };
            states.user = { x: 0, y: 0, s: 1, r: 0 };
            pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            updatePivotUI();
            applyTransforms();
        }
    }

    window.addEventListener('resize', () => {
        drawGrid();
        if (!isPrecisionMode) {
            pivot = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        }
    });
</script>

</body>
</html>
