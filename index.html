<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Wall Projector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            background-color: #000; 
        }
        #overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
        }
        .controls {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 12px;
            color: white;
            display: none;
            backdrop-filter: blur(5px);
        }
        #ar-button {
            padding: 18px 36px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #ar-button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        input[type=range] { width: 200px; }
        .info-msg {
            position: absolute;
            top: 40px;
            width: 80%;
            left: 10%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 11;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="info" class="info-msg">Проверка поддержки AR...</div>
        <div id="controls" class="controls">
            <div style="margin-bottom: 8px;">
                <label>Размер: </label>
                <input type="range" id="scale-range" min="0.1" max="5" step="0.1" value="1">
            </div>
            <button id="reset-btn" style="width: 100%; padding: 8px; border-radius: 6px; border: none; background: #f44336; color: white;">Сбросить положение</button>
        </div>
        <button id="ar-button">Запустить AR</button>
    </div>

    <script type="module">
        let camera, scene, renderer;
        let reticle; 
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let projectedImage = null;

        const arButton = document.getElementById('ar-button');
        const controls = document.getElementById('controls');
        const info = document.getElementById('info');
        const scaleRange = document.getElementById('scale-range');
        const resetBtn = document.getElementById('reset-btn');

        if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                if (supported) {
                    info.innerText = "AR доступен. Нажмите кнопку.";
                } else {
                    info.innerText = "AR не поддерживается этим браузером.";
                    arButton.disabled = true;
                }
            });
        } else {
            info.innerText = "WebXR не найден. Используйте Chrome на Android.";
            arButton.disabled = true;
        }

        arButton.addEventListener('click', () => {
            init();
        });

        async function init() {
            try {
                // Изменение: Минимизируем requiredFeatures, переносим всё в optional.
                // Также проверяем наличие domOverlay более аккуратно.
                const sessionInit = { 
                    optionalFeatures: ['hit-test', 'dom-overlay', 'local-floor'],
                };
                
                // Пробуем добавить dom-overlay только если мы уверены в элементе
                if (document.getElementById('overlay')) {
                    sessionInit.domOverlay = { root: document.getElementById('overlay') };
                }

                const session = await navigator.xr.requestSession('immersive-ar', sessionInit);
                setupRenderer(session);
                
                arButton.style.display = 'none';
                controls.style.display = 'block';
                info.innerText = "Наведите камеру на стену и немного подвигайте";
            } catch (e) {
                console.error("Session Error:", e);
                // Если не сработало с наложением, пробуем совсем без него (крайний случай)
                try {
                    const fallbackSession = await navigator.xr.requestSession('immersive-ar');
                    setupRenderer(fallbackSession);
                    arButton.style.display = 'none';
                    info.innerText = "Режим совместимости запущен";
                } catch (e2) {
                    alert("Не удалось запустить AR: " + e2.message);
                }
            }
        }

        function setupRenderer(session) {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const light = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(light);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                preserveDrawingBuffer: true
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            renderer.xr.setSession(session);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            session.addEventListener('select', onSelect);
            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            if (reticle.visible) {
                if (!projectedImage) {
                    const textureLoader = new THREE.TextureLoader();
                    const texture = textureLoader.load('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=500&auto=format&fit=crop&q=60');
                    
                    const geometry = new THREE.PlaneGeometry(1, 1);
                    const material = new THREE.MeshBasicMaterial({ 
                        map: texture, 
                        transparent: true, 
                        opacity: 0.6,
                        side: THREE.DoubleSide 
                    });
                    
                    projectedImage = new THREE.Mesh(geometry, material);
                    scene.add(projectedImage);
                }

                const position = new THREE.Vector3();
                const quaternion = new THREE.Quaternion();
                const scale = new THREE.Vector3();
                reticle.matrix.decompose(position, quaternion, scale);

                projectedImage.position.copy(position);
                projectedImage.quaternion.copy(quaternion);
                projectedImage.rotateX(Math.PI / 2);
                
                info.innerText = "Изображение установлено";
            }
        }

        scaleRange.addEventListener('input', (e) => {
            if (projectedImage) {
                const s = parseFloat(e.target.value);
                projectedImage.scale.set(s, s, s);
            }
        });

        resetBtn.addEventListener('click', () => {
            if (projectedImage) {
                scene.remove(projectedImage);
                projectedImage = null;
                info.innerText = "Ищите плоскость стены...";
            }
        });

        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((referenceSpace) => {
                        session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                            hitTestSource = source;
                        }).catch(err => console.log("Hit test not supported yet"));
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitResults(hitTestSource);
                    if (hitTestResults.length) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
