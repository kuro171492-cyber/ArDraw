<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Stencil Pro</title>
    <!-- MindAR для отслеживания изображений -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        .ui-overlay { z-index: 1000; position: absolute; }
        #target-preview {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 20px;
            z-index: 2000; text-align: center; color: black;
        }
    </style>
</head>
<body>

    <!-- Интерфейс -->
    <div class="ui-overlay inset-0 pointer-events-none flex flex-col justify-between p-6">
        
        <!-- Верхняя панель: Статус -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div id="statusTag" class="bg-black/50 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full flex items-center gap-2">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></div>
                <span id="statusText" class="text-xs font-bold uppercase tracking-widest">Поиск маркера...</span>
            </div>
            
            <button id="helpBtn" class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-full border border-white/20 flex items-center justify-center">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </button>
        </div>

        <!-- Нижняя панель: Управление -->
        <div class="bg-black/40 backdrop-blur-2xl border border-white/10 p-5 rounded-[2.5rem] pointer-events-auto flex flex-col gap-4 shadow-2xl">
            <div class="flex items-center justify-between gap-2">
                <!-- Загрузка -->
                <label class="w-14 h-14 bg-white/10 hover:bg-white/20 rounded-2xl flex items-center justify-center cursor-pointer transition-transform active:scale-90">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
                    <input type="file" id="imageLoader" accept="image/*" class="hidden">
                </label>

                <!-- Слайдер прозрачности -->
                <div class="flex-1 px-4 flex flex-col gap-1">
                    <div class="flex justify-between text-[10px] text-white/50 uppercase font-bold">
                        <span>Прозрачность</span>
                        <span id="opacityLabel">50%</span>
                    </div>
                    <input type="range" id="opacityRange" min="0" max="1" step="0.01" value="0.5" class="w-full h-1 bg-white/20 rounded-lg appearance-none cursor-pointer">
                </div>

                <!-- Масштаб внутри AR -->
                <div class="flex flex-col gap-1 items-center">
                   <button id="plusBtn" class="text-white/80 hover:text-white p-1"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                   <button id="minusBtn" class="text-white/80 hover:text-white p-1"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Окно помощи с маркером -->
    <div id="target-preview" class="shadow-2xl border-4 border-blue-500">
        <h3 class="font-bold mb-2">Маркер для AR</h3>
        <p class="text-sm text-gray-600 mb-4">Наведите камеру на это изображение (можно открыть на другом устройстве или распечатать)</p>
        <img src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" class="w-48 mx-auto mb-4 rounded-lg">
        <button onclick="document.getElementById('target-preview').style.display='none'" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Понятно</button>
    </div>

    <!-- AR Сцена -->
    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: true;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Сущность, которая привязывается к маркеру -->
        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
            <!-- Здесь будет ваше изображение -->
            <a-image id="ar-image" position="0 0 0" height="1" width="1" opacity="0.5" transparent="true"></a-image>
        </a-entity>
    </a-scene>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const arImage = document.getElementById('ar-image');
        const opacityRange = document.getElementById('opacityRange');
        const opacityLabel = document.getElementById('opacityLabel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const targetEntity = document.getElementById('ar-target');
        const helpBtn = document.getElementById('helpBtn');
        const preview = document.getElementById('target-preview');

        let currentScale = 1;

        // Показать помощь при старте
        setTimeout(() => {
            preview.style.display = 'block';
        }, 1000);

        helpBtn.onclick = () => preview.style.display = 'block';

        // Загрузка фото
        imageLoader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                arImage.setAttribute('src', url);
                
                // Корректируем пропорции
                const img = new Image();
                img.onload = () => {
                    const ratio = img.width / img.height;
                    arImage.setAttribute('width', ratio);
                    arImage.setAttribute('height', 1);
                };
                img.src = url;
            }
        });

        // Прозрачность
        opacityRange.addEventListener('input', (e) => {
            const val = e.target.value;
            arImage.setAttribute('opacity', val);
            opacityLabel.innerText = Math.round(val * 100) + '%';
        });

        // Масштабирование внутри AR
        document.getElementById('plusBtn').onclick = () => {
            currentScale *= 1.1;
            arImage.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        };
        document.getElementById('minusBtn').onclick = () => {
            currentScale *= 0.9;
            arImage.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
        };

        // Отслеживание событий AR
        targetEntity.addEventListener("targetFound", event => {
            statusDot.classList.replace('bg-amber-500', 'bg-green-500');
            statusText.innerText = "Маркер найден";
            console.log("target found");
        });

        targetEntity.addEventListener("targetLost", event => {
            statusDot.classList.replace('bg-green-500', 'bg-amber-500');
            statusText.innerText = "Поиск маркера...";
            console.log("target lost");
        });

    </script>
</body>
</html>
