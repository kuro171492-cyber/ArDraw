<html>
<head>
    <title>AR Projector</title>
</head>
<body>
    <h1>AR Projector</h1>
    <script>
        // AR anchoring feature using DeviceOrientation API
        let image = document.getElementById('ar-image');
        let anchor; 

        function onDeviceOrientation(event) {
            if (anchor) {
                // Lock the image position to physical paper
                const alpha = event.alpha;
                const beta = event.beta;
                const gamma = event.gamma;
                
                // Update the position of the image
                image.style.transform = `rotateY(${alpha}deg) rotateX(${beta}deg) translateZ(100px)`;
            }
        }

        window.addEventListener('deviceorientation', onDeviceOrientation);
    </script>
    <img id='ar-image' src='image.png' style='position: absolute; width: 200px; height: 200px;'/>
</body>
</html>
