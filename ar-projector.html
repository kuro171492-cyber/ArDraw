<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>AR Projector for Artists</title>\n    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>\n    <style>\n        body { margin: 0; overflow: hidden; }\n        #controls { position: absolute; top: 10px; left: 10px; z-index: 1000; }\n    </style>\n</head>\n<body>\n    <div id="controls">\n        <button id="load-image">Load Image</button>\n        <button id="zoom-in">Zoom In</button>\n        <button id="zoom-out">Zoom Out</button>\n    </div>\n    <a-scene embedded>\n        <a-assets>\n            <img id="loaded-image" src="" />\n        </a-assets>\n        <a-entity camera look-controls position="0 1.6 0">\n            <a-entity id="video" geometry="primitive: plane; height: 3; width: 4" material="shader: flat; src: #camera-feed;" position="0 1.5 -5"></a-entity>\n        </a-entity>\n        <a-entity id="camera-feed" camera position="0 1.6 0" look-controls></a-entity>\n        <a-entity id="image-entity" geometry="primitive: plane; height: 1; width: 1" material="shader: flat; src: #loaded-image" position="1 1 -3"></a-entity>\n    </a-scene>\n    <script>\n        let zoomFactor = 1;\n        const videoEntity = document.getElementById('video');\n        const imageEntity = document.getElementById('image-entity');\n        const loadImageButton = document.getElementById('load-image');\n        const zoomInButton = document.getElementById('zoom-in');\n        const zoomOutButton = document.getElementById('zoom-out');\n\n        loadImageButton.addEventListener('click', () => {\n            const imageUrl = prompt('Enter image URL:');\n            document.getElementById('loaded-image').src = imageUrl;\n        });\n\n        zoomInButton.addEventListener('click', () => {\n            zoomFactor += 0.1;\n            videoEntity.object3D.scale.set(zoomFactor, zoomFactor, zoomFactor);\n        });\n\n        zoomOutButton.addEventListener('click', () => {\n            zoomFactor = Math.max(1, zoomFactor - 0.1);\n            videoEntity.object3D.scale.set(zoomFactor, zoomFactor, zoomFactor);\n        });\n    </script>\n</body>\n</html>
