<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AR Artist - Draw Helper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-height: 100vh;
        }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        #camera-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            padding: 12px 16px 30px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-icon {
            font-size: 20px;
        }

        #status {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }

        /* Bottom toolbar */
        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 30px 12px 12px;
            z-index: 100;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
        }

        button:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.95);
        }

        button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }

        button.success {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
        }

        #file-input {
            display: none;
        }

        /* Control Panel - Hidden by default on mobile */
        #control-panel {
            position: fixed;
            bottom: 70px;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 16px;
            border-radius: 12px 0 0 12px;
            z-index: 99;
            max-width: 280px;
            display: none;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 60vh;
            overflow-y: auto;
        }

        #control-panel.show {
            display: flex;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .control-value {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        /* Gesture hint */
        #gesture-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: #aaa;
            padding: 16px 24px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #gesture-hint.show {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 480px) {
            button {
                padding: 10px 12px;
                font-size: 12px;
                min-height: 40px;
            }

            .title {
                font-size: 14px;
            }
        }

        @media (min-width: 768px) {
            #control-panel {
                display: flex !important;
            }

            #toggle-panel-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="camera-container">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas-overlay"></canvas>
    </div>

    <div id="header">
        <div>
            <div class="title">
                <span class="title-icon">🎨</span>
                <span>AR Artist</span>
            </div>
            <div id="status">Loading...</div>
        </div>
    </div>

    <div id="control-panel">
        <div class="control-group">
            <span class="control-label">Opacity</span>
            <div class="control-value"><span id="opacity-value">100</span>%</div>
            <input type="range" id="opacity" min="0" max="100" value="100">
        </div>
        <div class="control-group">
            <span class="control-label">Scale</span>
            <div class="control-value"><span id="scale-value">1.0</span>x</div>
            <input type="range" id="scale" min="0.1" max="3" step="0.1" value="1">
        </div>
        <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 4px 0;">
        <button style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);" id="reset-btn">↻ Reset</button>
    </div>

    <div id="toolbar">
        <input type="file" id="file-input" accept="image/*">
        <button class="primary" id="load-image-btn">
            <span>📷</span> Load Image
        </button>
        <button id="toggle-panel-btn">⚙️ Settings</button>
        <button id="fullscreen-btn">⛶ Fullscreen</button>
    </div>

    <div id="gesture-hint"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas-overlay');
        const ctx = canvas.getContext('2d', { willReadFrequently: false });
        const fileInput = document.getElementById('file-input');
        const statusEl = document.getElementById('status');
        const controlPanel = document.getElementById('control-panel');
        const togglePanelBtn = document.getElementById('toggle-panel-btn');
        const gestureHint = document.getElementById('gesture-hint');

        let loadedImage = null;
        let opacity = 1;
        let scale = 1;
        let xOffset = 0;
        let yOffset = 0;

        // Touch/Gesture variables
        let touchStartDistance = 0;
        let lastScale = 1;
        let lastX = 0;
        let lastY = 0;
        let velocityX = 0;
        let velocityY = 0;
        let isAnimating = false;

        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Initialize camera
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    statusEl.textContent = '✅ Camera ready • Use 2 fingers to zoom • Drag to move';
                };

            } catch (error) {
                console.error('Camera error:', error);
                statusEl.textContent = '❌ Camera access denied';
            }
        }

        // Load image
        document.getElementById('load-image-btn').addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    loadedImage = new Image();
                    loadedImage.onload = () => {
                        statusEl.textContent = `✅ Image loaded: ${file.name}`;
                        showGestureHint('Drag to move • Pinch to zoom');
                    };
                    loadedImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function showGestureHint(text) {
            gestureHint.textContent = text;
            gestureHint.classList.add('show');
            setTimeout(() => gestureHint.classList.remove('show'), 3000);
        }

        // Control panel toggle
        togglePanelBtn.addEventListener('click', () => {
            controlPanel.classList.toggle('show');
        });

        // Sliders
        document.getElementById('opacity').addEventListener('input', (e) => {
            opacity = e.target.value / 100;
            document.getElementById('opacity-value').textContent = e.target.value;
        });

        document.getElementById('scale').addEventListener('input', (e) => {
            scale = parseFloat(e.target.value);
            document.getElementById('scale-value').textContent = scale.toFixed(1);
        });

        // Reset
        document.getElementById('reset-btn').addEventListener('click', () => {
            opacity = 1;
            scale = 1;
            xOffset = 0;
            yOffset = 0;
            velocityX = 0;
            velocityY = 0;
            document.getElementById('opacity').value = 100;
            document.getElementById('scale').value = 1;
            document.getElementById('opacity-value').textContent = '100';
            document.getElementById('scale-value').textContent = '1.0';
            showGestureHint('Position reset ↻');
        });

        // Fullscreen
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err.message);
                });
            }
        });

        // Touch gestures
        let touches = [];

        canvas.addEventListener('touchstart', (e) => {
            touches = Array.from(e.touches);
            isAnimating = false;

            if (touches.length === 2) {
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                touchStartDistance = Math.sqrt(dx * dx + dy * dy);
                lastScale = scale;
            } else if (touches.length === 1) {
                lastX = touches[0].clientX;
                lastY = touches[0].clientY;
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            touches = Array.from(e.touches);

            if (touches.length === 2) {
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const ratio = distance / touchStartDistance;
                scale = Math.max(0.1, Math.min(3, lastScale * ratio));
                document.getElementById('scale').value = scale;
                document.getElementById('scale-value').textContent = scale.toFixed(1);
            } else if (touches.length === 1) {
                const deltaX = touches[0].clientX - lastX;
                const deltaY = touches[0].clientY - lastY;

                xOffset += deltaX;
                yOffset += deltaY;

                velocityX = deltaX;
                velocityY = deltaY;

                lastX = touches[0].clientX;
                lastY = touches[0].clientY;
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            touches = [];
            // Inertia scrolling
            if (Math.abs(velocityX) > 1 || Math.abs(velocityY) > 1) {
                isAnimating = true;
                animateInertia();
            }
        }, { passive: true });

        function animateInertia() {
            if (!isAnimating) return;

            velocityX *= 0.95;
            velocityY *= 0.95;

            xOffset += velocityX;
            yOffset += velocityY;

            if (Math.abs(velocityX) > 0.1 || Math.abs(velocityY) > 0.1) {
                requestAnimationFrame(animateInertia);
            } else {
                isAnimating = false;
            }
        }

        // Mouse support (for desktop testing)
        let isMouseDown = false;
        let mouseLastX = 0;
        let mouseLastY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseLastX = e.clientX;
            mouseLastY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isMouseDown) {
                const deltaX = e.clientX - mouseLastX;
                const deltaY = e.clientY - mouseLastY;
                xOffset += deltaX;
                yOffset += deltaY;
                mouseLastX = e.clientX;
                mouseLastY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale = Math.max(0.1, Math.min(3, scale + (e.deltaY > 0 ? -0.1 : 0.1)));
            document.getElementById('scale').value = scale;
            document.getElementById('scale-value').textContent = scale.toFixed(1);
        }, { passive: false });

        // Drawing loop
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (loadedImage) {
                ctx.save();
                ctx.globalAlpha = opacity;

                const centerX = canvas.width / 2 + xOffset;
                const centerY = canvas.height / 2 + yOffset;
                const scaledWidth = loadedImage.width * scale;
                const scaledHeight = loadedImage.height * scale;

                ctx.drawImage(
                    loadedImage,
                    centerX - scaledWidth / 2,
                    centerY - scaledHeight / 2,
                    scaledWidth,
                    scaledHeight
                );

                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        // Start
        initCamera();
        draw();
    </script>
</body>
</html>
