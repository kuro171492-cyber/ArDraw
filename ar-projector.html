<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Projector for Artists</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #controls { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        button { padding: 8px 12px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div id="controls">
        <button id="load-image">Load Image</button>
        <button id="zoom-in">Zoom In</button>
        <button id="zoom-out">Zoom Out</button>
    </div>
    <a-scene embedded>
        <a-assets>
            <img id="loaded-image" src="" />
        </a-assets>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        <a-entity id="image-entity" 
                  geometry="primitive: plane; height: 1; width: 1" 
                  material="src: #loaded-image" 
                  position="1 1 -3">
        </a-entity>
    </a-scene>
    <script>
        let zoomFactor = 1;
        const imageEntity = document.getElementById('image-entity');
        const loadImageButton = document.getElementById('load-image');
        const zoomInButton = document.getElementById('zoom-in');
        const zoomOutButton = document.getElementById('zoom-out');

        loadImageButton.addEventListener('click', () => {
            const imageUrl = prompt('Enter image URL:');
            if (imageUrl && imageUrl.trim() !== '') {
                const img = new Image();
                img.onerror = () => alert('Failed to load image. Check the URL.');
                img.onload = () => {
                    document.getElementById('loaded-image').src = imageUrl;
                    console.log('Image loaded successfully');
                };
                img.src = imageUrl;
            }
        });

        zoomInButton.addEventListener('click', () => {
            zoomFactor += 0.1;
            imageEntity.object3D.scale.set(zoomFactor, zoomFactor, zoomFactor);
            console.log('Zoom factor:', zoomFactor.toFixed(2));
        });

        zoomOutButton.addEventListener('click', () => {
            zoomFactor = Math.max(0.1, zoomFactor - 0.1);
            imageEntity.object3D.scale.set(zoomFactor, zoomFactor, zoomFactor);
            console.log('Zoom factor:', zoomFactor.toFixed(2));
        });
    </script>
</body>
</html>
